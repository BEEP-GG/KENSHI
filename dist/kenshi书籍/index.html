10、体质-10、智力-10、魅力-10。',difficulty:'极难',icon:'Skull',equipment:['无'],money:0,allowedRegions:['great_desert']},{id:'dark_daughter',title:'黑暗之女',description:'你是被诅咒的女孩，你们一族对于性爱的渴望超乎常人，你们的体液就是最好的催情剂，但也因此被圣骑士们赶尽杀绝，躲在了这一片污秽、不洁的黑暗之地，但是你降世了，你可以拯救这一种族，夺回荣光远胜此地百倍的故乡。',difficulty:'困难',icon:'Moon',equipment:['武士刀','黑色亚麻衣物'],money:1e3,allowedRegions:['iron_valley'],allowedRaces:['narko'],allowedSubraces:['narko_child'],allowedGenders:['female'],alliedFactions:['娜尔可'],hostileFactions:['神圣教国']},{id:'officer_son',title:'贵族之子',description:'你的父亲是联合帝国军队内一位受人尊敬的长官。他在行动中被杀了，在你寻找工作的微薄积蓄被烧之后，你发现自己身无分文且饥肠辘辘，除了你父亲可信赖的刀和你背上的衬衫之外别无他物。联合帝国邦仍然是你的盟友。',difficulty:'普通',icon:'Crown',equipment:['长官佩刀','衬衫'],money:0,allowedRegions:['great_desert','heng'],hostileFactions:['神圣教国'],alliedFactions:['联合帝国']},{id:'slave',title:'重生',description:'你只是另一个奴隶，在神圣教国重生镇的坑中工作，以建造一个毫无意义的雕像，你梦想着传说中的南方自由土地，并听说了北方叛乱分子的故事。',difficulty:'困难',icon:'Pickaxe',equipment:['破布衫'],money:0,allowedRegions:['rebirth'],hostileFactions:['神圣教国']},{id:'male_slave',title:'男奴',description:'你曾是一个风光的科技猎手，一次冒险中，误入了她们的帝国，说了对女性不忠的话，现在你只是一条狗，要听话哦~',difficulty:'困难',icon:'VenetianMask',equipment:['破布衫'],money:0,allowedRegions:['south_wetlands'],fixedRegion:'south_wetlands',fixedTown:'斯威士之剑',allowedGenders:['male'],forbiddenRaces:['skeleton'],hostileFactions:['斯威士国']},{id:'cannibal_hunter',title:'食人族猎人',description:'“我真的很后悔来到了食人族的领地。这是个愚蠢的想法。”',difficulty:'极难',icon:'Skull',equipment:['砍刀','高级急救包 x1'],money:200,allowedRegions:['cannibal_plains'],hostileFactions:['食人族部落']},{id:'pirate_heir',title:'海盗之梦',description:'你早早听说了海盗王的风光故事，你大老远来到此处就是为了学习如何成为一名强大海盗，协助海盗王或是夺取他的名号，在这片大陆中名垂千古。',difficulty:'困难',icon:'Skull',equipment:['弯刀','破旧披风'],money:300,allowedRegions:['green_coast']},{id:'cannibal_unifier',title:'呜哇呜哇哇(夺回家园)',description:'你是肉主部落的一族，南方的食人族猎手杀死了你的家人，你只是想活下去，有什么错。杀光他们，将他们的头颅挂在你的旗子上，让世人皆知你的名号。',difficulty:'极难',icon:'Skull',equipment:['巨骨战斧','兽皮披肩','干肉'],money:0,allowedRegions:['dark_finger'],allowedRaces:['cannibal'],alliedFactions:['肉主部落'],hostileFactions:['大巫部落','食人族猎手']},{id:'brotherhood_prisoner',title:'兄弟会',description:'你是愿意当个无名之辈，一辈子被踩在脚下，然后像条野狗一样死在路边?还是愿意拿起刀，就算活不到三十岁也要让所有贵族都记住你的名字！！！',difficulty:'困难',icon:'Pickaxe',equipment:[],money:0,allowedRegions:['stobers_garden'],alliedFactions:['鲜血掠夺者'],hostileFactions:['联合帝国']},{id:'freedom_seekers',title:'无名之辈(测试版，可能存在bug',description:'你厌倦了令人窒息的城市生活和税收，你集结了一个小队外出并找到了自己的家园基地。你已经组建了一个加上你一共五个志同道合的人组成的团队，并且已经收集了大量的建筑材料。',difficulty:'普通',icon:'Users',equipment:['铁棒 x3','基础医疗包','建筑材料'],money:2e3},{id:'mongrel_wanderer',title:'蒙格勒迷途者',description:'浓雾笼罩的雾岛之中，你在迷途中求生，依靠残存的意志寻找出路。',difficulty:'困难',icon:'Compass',equipment:['破旧披风','干粮'],money:200,allowedRegions:['fog_islands']},{id:'merchant',title:'流浪商人',description:'你有一些积蓄和一头驮兽。你渴望在这个残酷的世界中建立一个贸易帝国。',difficulty:'简单',icon:'Coins',equipment:['商人的背包','铁棒','驼牛'],money:4e3,companions:[{race:'pack_beast',subrace:'pack_beast',attributes:{strength:1,dexterity:1,perception:1,constitution:1,will:1,intelligence:1,charisma:1},name:'驼兽',gender:'other',age:6,appearance:{eyes:'',hairStyle:'',hairColor:'',bodyType:'',height:190,description:''},traits:[],customTraitName:'',customTraitDescription:''}]},{id:'kral_choice',title:'克拉尔之选',description:'有人说你是克拉尔的后裔，沙克王国传说中的勇士，你应当是沙克王国的合法首领，你已经准备好在历史上占据一席之地。懦弱的女皇坐在沙克王国的宝座上瑟瑟发抖，她唯一的计划就是坐以待毙，等什么？难道要等奥克兰人向一个曾经骄傲的王国发动毁灭的入侵？沙克人需要一个强有力的领导，而你就是将团结沙克族的人！！拯救我们的种族！！复兴我们的王国！！！！',difficulty:'困难',icon:'Crown',equipment:['沙克大剑','破烂的雇佣兵之甲'],money:0,allowedRegions:['stenn_desert'],allowedRaces:['shek'],allowedSubraces:['shek_royal'],alliedFactions:['克拉尔之选'],hostileFactions:['沙克王国']},{id:'fish_island_refugee',title:'渔岛难民',description:'你是受鱼形人危机影响的难民。你不确定你的生活会变成什么样。也许你最好把这一切抛在脑后…或者继续和这些野兽战斗。',difficulty:'普通',icon:'Fish',equipment:['鱼矛','雇佣兵之甲'],money:500,allowedRegions:['bonefields_south'],allowedRaces:['lizardfolk'],alliedFactions:['库尔林'],hostileFactions:['鱼形人']},{id:'bast_stray',title:'带着狗的家伙',description:'联合帝国和神圣教国之间的战争使这个曾经繁荣的地区变得荒凉、破败、贫穷和贫瘠。你是一个无家可归、饥肠辘辘的漂泊者，救了一只被遗弃的小狗，它似乎非常没用，也许你只会吃了它。尝试面对北方食人族的袭击、西方神圣教国的行刑队以及渴望用极端偏见解决任何难民问题的南方联合城武士巡逻队生存下来，你听说了一些大沙漠北方叛乱分子的传言……',difficulty:'困难',icon:'PawPrint',equipment:['破布衫'],money:500,allowedRegions:['bast'],fixedRegion:'bast',fixedTown:'巴斯特城',companions:[{race:'canine',subrace:'stray_dog',attributes:{strength:1,dexterity:1,perception:1,constitution:1,will:1,intelligence:1,charisma:1},name:'小狗',gender:'other',age:1,appearance:{eyes:'',hairStyle:'',hairColor:'',bodyType:'',height:50,description:''},traits:[],customTraitName:'',customTraitDescription:''}]},{id:'author_self_test',title:'作者自测用',description:'仅用于作者内部自测的隐藏剧本。',difficulty:'普通',icon:'Eye',equipment:['无'],money:0,hidden:!0}],dl=[{id:'iron_valley',title:'铁之谷',description:'污秽与黑暗盘踞之地，娜尔可一族在此隐藏，等待复兴的火种。',towns:['娜尔可守望'],danger:'极高'},{id:'stenn_desert',title:'斯坦沙漠',description:'沙克王国的广袤沙海，强者与荣耀的试炼之地。',towns:['新卡拉迪亚'],danger:'高'},{id:'bonefields_south',title:'骸骨荒原南部',description:'荒原南部的腐骨与盐风交织，渔网散落在海风与尘沙之间。',towns:['渔网'],danger:'高'},{id:'stobers_garden',title:'斯托伯的花园',description:'被遗忘的残垣与荒草蔓延，古代残迹在此沉眠。',towns:['方舟'],danger:'极高'},{id:'border_zone',title:'边境之地',description:'神圣王国与沙克王国之间的缓冲地带。这里是流浪者、强盗和被流放者的家园。',towns:['枢纽城','斯昆镇'],danger:'中等'},{id:'great_desert',title:'大沙漠',description:'联合城的中心地带。这里有巨大的财富，也有残酷的奴隶制。',towns:['赫夫特城','小巴泰镇','白鼬镇','巴克镇'],danger:'高'},{id:'heng',title:'恒',description:'充满铜臭与野心的白色沙海。希望你带来了足够多的金钱。',towns:['恒城','汉城','元城'],danger:'高'},{id:'holy_nation',title:'奥克兰之傲',description:'肥沃的绿地，由狂热的宗教统治。如果你是人类男性，这里是天堂；否则，这里是地狱。',towns:['水泡山丘','坏牙镇','恩勒门特'],danger:'极高 (对非人类)'},{id:'okan_bay',title:'奥克兰之湾',description:'圣国北部沿海的冷峻湾区，险峻峭壁与严苛教规并存，圣火在海风中更显肃穆。',towns:['斯塔克镇'],danger:'高'},{id:'bast',title:'巴斯特',description:'联合帝国与神圣教国之间的战火撕裂了这片土地，曾经繁荣的聚落如今荒凉、破败、贫穷而贫瘠。',towns:['巴斯特城'],danger:'高'},{id:'swamp',title:'沼泽地',description:'无法无天的地带，充满了走私犯、帮派和致命的生物。',towns:['鲨鱼城'],danger:'中等'},{id:'cannibal_plains',title:'食人族平原',description:'狂乱野蛮之地，遍布饥饿的食人族。只有不停奔跑，才能免于被生吞活剥。',towns:['死猫村之都'],danger:'极高'},{id:'dark_finger',title:'黑暗之指',description:'这里主要栖息着作为土著的食人部落，是联合帝国北部的一大威胁区域。',towns:['野外'],danger:'极高'},{id:'green_coast',title:'绿色海岸',description:'危险而肥沃的土地。若想在此立足，你最好先向那群怪人或是巨蟹证明忠诚。',towns:['托尔图加'],danger:'高'},{id:'rebirth',title:'重生镇',description:'建立在岩石上的地狱。奴隶们通过无止境的劳作，试图洗刷那虚无缥缈的罪孽。',towns:['重生镇'],danger:'极高'},{id:'fog_islands',title:'雾岛',description:'浓雾笼罩的哀嚎之谷。我看不见它们，它们却能找到我。',towns:['蒙格勒'],danger:'极高'},{id:'south_wetlands',title:'钩子海滨',description:'联合城与商会掌控的繁荣海滨。财富流动之余，女权主义的极端势力在此割据。',towns:['漂泊终地','斯威士之剑','吉利之剑','科隆斯城'],danger:'高'},{id:'bonefields',title:'骸骨荒原',description:'遍布远古巨兽骸骨的荒原。成群的长颈鹿在此游荡，将闯入者吞入腹中。',towns:['开顿城'],danger:'极高'}],ml=[{id:'human',title:'人类',description:'人类是废土上数量最多、分布最广的种族，其生理结构最为标准和均衡。他们没有坚硬的骨板或厚实的甲壳，肉体相对脆弱，且对废土上恶劣的自然环境没有任何天生的抵抗力。不过，人类的优势在于其无与伦比的学习能力，他们是适应性最强的种族，没有明显的短板，但也没有突出的优势。',subraces:[{id:'greenlander',title:'绿原之子',description:'作为人类中最庞大且最具代表性的群体，绿原之子是废土上绝大多数文明体系的缔造者与基石。他们生来就习惯于在复杂的社会与体制中生存，拥有极高的农业、烹饪和科学天赋。平庸的体质可能会让他们吃尽苦头，但凭借无与伦比的适应能力，他们往往能迅速学会新的生存技能，甚至在荒野中建立起属于自己的新家园。',attributeSummary:'智力+10'},{id:'scorchlander',title:'焦土之子',description:'焦土之子是天生的叛逆者和冒险家。他们拥有深色的肌肤，生性桀骜不驯，极度厌恶枯燥的农业劳动与任何形式的社会约束。他们崇尚绝对的个体自由，行事往往随心所欲，因此不愿在等级森严的帝国中安分守己。正因如此，部分派系厌恶并且鄙视这一肤色的种族，视其为劣等人类。',attributeSummary:'敏捷+5、魅力-5'},{id:'keter_descendant',title:'奇特林后裔',description:'奇特林后裔传闻是奥克兰血脉，他们生来就缺乏任何道德与信仰的寄托，终生被无尽的贪婪与极度的恐惧所支配，对这片残酷大陆上的所有生命都抱有病态的猜疑。因为内心的极度缺乏安全感，他们几乎本能地诉诸野蛮的暴力，将其作为生存、掠夺和掩饰软弱的唯一手段。',attributeSummary:'感知+10、智力-10'}]},{id:'narko',title:'娜尔可',description:'被诅咒的一族，你们肤色惨白，但却出奇的美丽，对于性爱的疯狂追求使得你们遭人唾弃。',subraces:[{id:'narko_child',title:'蒙受神恩者',description:'蒙受神恩者又称为堕落者，或者魅魔。尽管外表与人类相似，但经研究，她们的身体内部结构和人类截然不同。甚至说，更加接近被称为骨人的物种。而在他们尚未变化，还属于人类族类之时，和人类一样属于肉身。她们身体的这种改变，和古代人类有关。。。。。甚至是发生了变异。',attributeSummary:'敏捷+5、魅力+15、力量-5、体质-10'}]},{id:'west_hive',title:'西部蜂巢族',description:'蜂巢族拥有近似昆虫的生理结构，最显著的特征是极其细长、宛如枯枝般的四肢。他们的身体异常脆弱，四肢很容易在战斗中被切断。他们的胸腔骨骼奇特，导致无法穿戴普通人类的衬衫；由于生有极其宽大、平坦且没有脚趾的脚掌，他们终生无法穿戴任何鞋类。不过，他们体内流淌着特殊的体液，天生免疫废土上致命的酸雨。\n\n善于经商的黄色皮肤蜂巢族，是废土上最友善的一群人。\n初始属性修正：魅力+10、敏捷+5、力量-10。\n技能加成：交易+15、说服+5。\n种族特性：商业头脑。\n西部蜂巢族是善于经商的黄色皮肤蜂巢族，是大陆上最友善但贪婪的一群人。',subraces:[{id:'hive_prince',title:'智蜂',description:'蜂巢中的最高等级，女王的右手。没有人见过真正的女王，是智蜂掌管一切。自由智蜂通常是由于失去对一位敌对智蜂的命令，或是被驱逐出去作为对某种失败的惩罚而导致的结果。它们比普通的蜂群更聪明，更自由。',attributeSummary:'智力+15、感知+10、力量-10',allowedGenders:['male']},{id:'hive_worker',title:'工蜂',description:'这些工人是消耗品，生来就是为蜂巢劳动的，他们只知道服从和为蜂巢族服务，他们将这些置于个人利益、安危和舒适之上。如果切断蜂巢对他们的控制，他们通常就会死亡，但在极少数情况下也会成为自由的个体。他们会对新得到的自由感到困惑，也会因为失去预先确定的目的而迷茫，他们会茫然地寻找人生的意义，但他们通常只能找到死亡和剥削。',attributeSummary:'敏捷+5、力量+5、体质+5、智力-15',allowedGenders:['male']},{id:'hive_soldier',title:'兵蜂',description:'兵蜂生来就是为了保护蜂巢和控制工蜂。他们比工蜂更强壮，也更聪明，他们很少追寻自由，脱离种族的人最后大多成为了雇佣兵或是其他派系的士兵。',attributeSummary:'智力+15、感知+10、力量-10、敏捷+5',allowedGenders:['male']},{id:'hive_princess',title:'蜂巢公主',description:'每隔一段时间，就有一种异常体出现在蜂巢族的形成过程中。古老的基因模板，长时间处于休眠状态，干扰并与标准工蜂融合在一起。大多数情况下，这导致了可恶的动物的死亡，但偶尔也会有一个幸存下来。一个假女王，注定要制造失败的蜂房，然后慢慢地腐烂。由于它们无法自己创造新的蜂巢族，而且通常没有信息素来保持它们的温顺和顺从，它们很快就会被赶出蜂巢，在严酷的外部世界中枯萎。',attributeSummary:'魅力+5、敏捷+5、感知+5、力量-15',allowedGenders:['female']}]},{id:'south_hive',title:'南部蜂巢族',description:'蜂巢族拥有近似昆虫的生理结构，最显著的特征是极其细长、宛如枯枝般的四肢。他们的身体异常脆弱，四肢很容易在战斗中被切断。他们的胸腔骨骼奇特，导致无法穿戴普通人类的衬衫；由于生有极其宽大、平坦且没有脚趾的脚掌，他们终生无法穿戴任何鞋类。不过，他们体内流淌着特殊的体液，天生免疫废土上致命的酸雨。\n\n极度排外且侵略性的血红色蜂巢族，拥有更强的军事力量。\n初始属性修正：力量+5、体质+5、魅力-15、智力-10。\n种族特性：战斗狂热（最终伤害+5）。\n南部蜂巢族极度排外且侵略性的血红色肤色的蜂巢族，拥有更强的军事力量但智力其他相比较低',subraces:[{id:'hive_prince',title:'智蜂',description:'蜂巢中的最高等级，女王的右手。没有人见过真正的女王，是智蜂掌管一切。自由智蜂通常是由于失去对一位敌对智蜂的命令，或是被驱逐出去作为对某种失败的惩罚而导致的结果。它们比普通的蜂群更聪明，更自由。',attributeSummary:'智力+15、感知+10、力量-10',allowedGenders:['male']},{id:'hive_worker',title:'工蜂',description:'这些工人是消耗品，生来就是为蜂巢劳动的，他们只知道服从和为蜂巢族服务，他们将这些置于个人利益、安危和舒适之上。如果切断蜂巢对他们的控制，他们通常就会死亡，但在极少数情况下也会成为自由的个体。他们会对新得到的自由感到困惑，也会因为失去预先确定的目的而迷茫，他们会茫然地寻找人生的意义，但他们通常只能找到死亡和剥削。',attributeSummary:'敏捷+5、力量+5、体质+5、智力-15',allowedGenders:['male']},{id:'hive_soldier',title:'兵蜂',description:'兵蜂生来就是为了保护蜂巢和控制工蜂。他们比工蜂更强壮，也更聪明，他们很少追寻自由，脱离种族的人最后大多成为了雇佣兵或是其他派系的士兵。',attributeSummary:'智力+15、感知+10、力量-10、敏捷+5',allowedGenders:['male']},{id:'hive_princess',title:'蜂巢公主',description:'每隔一段时间，就有一种异常体出现在蜂巢族的形成过程中。古老的基因模板，长时间处于休眠状态，干扰并与标准工 ummary:'力量+15、体质+15、敏捷-5',locked:!0,lockedReason:'仅“克拉尔之选”剧本可选',unlockScenarios:['kral_choice']}]},{id:'lizardfolk',title:'原始种族',description:'由更古老的血脉衍生的原始种族分支。',subraces:[{id:'lizardfolk_base',title:'蜥蜴人',description:'蜥蜴人是潜伏在大陆上强壮的爬行类战士，最显著的特征是全身覆盖着一层坚韧且排列致密的鳞片皮肤。这些鳞片如同天然的盔甲，为他们提供了极佳的额外保护。作为可怕的猎手，他们拥有锐利的尖牙与利爪；但由于长有反关节的爬行类下肢与巨大的趾爪，他们与蜂巢族一样终生无法穿戴任何鞋类，粗壮的尾巴和修长的吻部也使得他们难以戴上普通人类的全封闭头盔。不过，尽管有这种爬行动物看起来十分具有威胁，但在这个大陆的生存上还是比较失败的，许多人猎杀他们并剥下他们的鳞片进行售卖制作。',attributeSummary:'体质+5、敏捷+10、感知+5、魅力-15'},{id:'goatfolk',title:'山羊人',description:'尚未完善背景设定。',locked:!0,lockedReason:'作者暂未做完背景',unlockScenarios:['author_self_test']},{id:'fungoid',title:'真菌人',description:'尚未完善背景设定。',locked:!0,lockedReason:'作者暂未做完背景',unlockScenarios:['author_self_test']},{id:'fishfolk',title:'鱼形人',description:'拥有水生特征的古老血脉。',locked:!0,lockedReason:'作者暂未做完背景',unlockScenarios:['author_self_test']}]},{id:'cannibal',title:'食人族',description:'食人族天性野蛮，而且经常会相互争斗，他们还会吃同类的身体。但据可靠消息，他们曾经也是人类，似乎第二帝国的一些原因，使得大脑出了问题，并且饥饿使得他们同类相食。他们有着自己的语言沟通，因为饥饿导致他们大部分人营养不良，智力低下。',subraces:[{id:'cannibal_brute',title:'食人族大只佬',description:'粗野巨躯的大型食人族，他的大脑相对于其他亚种更为愚蠢。初始属性修正：体质+20、智力-35、感知-15。'},{id:'cannibal_warrior',title:'干瘦食人族',description:'体态干瘦却动作迅猛的的他们，一般属于食人族中的炮灰。初始属性修正：敏捷+15、智力-20、体质-10。'},{id:'cannibal_priest',title:'食人族祭师',description:'食人族中最为聪明的存在，至少他们会讲人类的语言。初始属性修正：智力+15、体质-15。'}]},{id:'skeleton',title:'骨人',description:'骨人完全是个谜，没人知道他们来自哪里，又是怎么被创造出来的，但人们认为他们已经有几千岁了。他们有完整的感情，能感到悲伤，愤怒，激动，同情，震惊和快乐，但他们不能通过表情展示出来，再加上他们缺乏幽默感，总是让其他种族感到困惑，比如沙克族就认为他们善变，难以预料。他们没有偏见，无惧死亡，因此是勇敢无畏的战士。种族特质：无情面容（魅力表情检定失败但免疫恐惧）。',subraces:[{id:'skeleton_mki',title:'MKI (圆头)',description:'初始属性修正：体质+5。'},{id:'skeleton_mkii',title:'MKII (摄像头)',description:'初始属性修正：感知+5。'},{id:'skeleton_mkiii',title:'MKIII (尖头)',description:'初始属性修正：力量+5。'}]},{id:'canine',title:'犬类',description:'废土上常见的流浪犬族群，多以本能和饥饿驱动。',hidden:!0,subraces:[{id:'stray_dog',title:'流浪犬',description:'饥肠辘辘的小型犬类，敏感而谨慎。'}]},{id:'pack_beast',title:'驼兽',description:'商队常用的负重兽类，性情温驯而耐力惊人。',hidden:!0,subraces:[{id:'pack_beast',title:'驼兽',description:'常见的驮兽品种，可在恶劣环境中长途跋涉。'}]}],hl={attribute:[{id:'tough',title:'坚韧',description:'你的皮肤像皮革一样粗糙。体质 +5',category:'attribute'},{id:'iron_bones',title:'铁骨',description:'骨骼如铁。力量 +5',category:'attribute'},{id:'swift',title:'迅捷',description:'步伐轻快如风。敏捷 +5',category:'attribute'},{id:'hawk_eye',title:'鹰眼',description:'视线锐利无比。感知 +5',category:'attribute'},{id:'strategist',title:'谋略家',description:'思路清晰，擅长筹划。智力 +5',category:'attribute'},{id:'unyielding',title:'不屈',description:'意志像钢铁般坚定。意志 +5',category:'attribute'},{id:'silver_tongue',title:'巧言',description:'言辞得体，善于交涉。魅力 +5',category:'attribute'},{id:'thief',title:'惯偷',description:'手指灵活，动作干净利落。敏捷 +5',category:'attribute'},{id:'laborer',title:'苦工',description:'久经体力劳作。力量 +5',category:'attribute'},{id:'endurant',title:'耐性',description:'经得起疲惫与饥饿。体质 +5',category:'attribute'},{id:'alert',title:'警觉',description:'对周围的变化极其敏感。感知 +5',category:'attribute'},{id:'intuitive',title:'直觉',description:'对局势的判断更快。智力 +5',category:'attribute'}],life:[{id:'glutton',title:'暴食者',description:'你更容易感到饥饿。',category:'life'},{id:'insomniac',title:'失眠者',description:'你总是难以入睡。',category:'life'},{id:'greedy',title:'贪婪',description:'你对财富有强烈执念。',category:'life'},{id:'soft_hearted',title:'心软',description:'你难以拒绝别人的请求。',category:'life'},{id:'loner',title:'独行者',description:'你更习惯独自行动。',category:'life'},{id:'impulsive',title:'冲动',description:'你经常先行动后思考。',category:'life'},{id:'paranoid',title:'多疑',description:'你很难完全信任他人。',category:'life'},{id:'dreamer',title:'空想家',description:'你常沉浸在幻想里。',category:'life'},{id:'stingy',title:'吝啬',description:'你不愿轻易花费资源。',category:'life'},{id:'messy',title:'邋遢',description:'你不太在意整洁。',category:'life'}],fun:[{id:'goblin_mode',title:'小地精模式',description:'你会把废墟里的破烂当作宝藏。',category:'fun'},{id:'campfire_poet',title:'篝火诗人',description:'你喜欢在篝火旁吟诵尬诗。',category:'fun'},{id:'chaos_gremlin',title:'混乱小妖',description:'你总能把事态往奇怪方向推。',category:'fun'},{id:'meme_lord',title:'迷因之王',description:'你能在任何场合讲出烂梗。',category:'fun'},{id:'fourth_wall',title:'打破第四面墙',description:'你偶尔会盯着镜头说话。',category:'fun'},{id:'spicy_talker',title:'口无遮拦',description:'你说话经常跑偏。',category:'fun'},{id:'midnight_story',title:'午夜故事家',description:'你喜欢讲一些让人尴尬的故事。',category:'fun'},{id:'improper_thinker',title:'不正经的脑内剧场',description:'你总能把日常联想到奇怪的画面。',category:'fun'}]},pl=({data:t})=>{const[n,r]=i.useState(!1),[a,s]=i.useState(!1),l={wanderer:'在这片残酷废土上，你只是微不足道的一粒沙尘。\n你没有显赫的背景，没有势力的庇护，兜里的开币也早已耗尽。\n此刻，全部身家只剩身上那件沾满污渍的破布单衣，以及紧紧攥在手里那把生锈卷刃、连野狗皮都未必能砍透的破铁剑。\n\n你或许曾有过去，但在这弱肉强食的世界里没人会在乎。\n干瘪的肠胃正向你发出致命警告。\n在这个毫无怜悯的大地上，你唯一的任务就是用尽一切手段活过今天。\n握紧你那把可悲的锈剑，你的废土求生传说，将从无名之辈的挣扎中拉开帷幕。',bast_stray:'这里曾是繁华的巴斯特城，如今联合帝国与神圣教国的绞肉机战争，将它彻底化作了焦土与废墟。\n你是个无家可归、饿得眼冒金星的流浪汉，身边唯一的活物，是你一时心软救下的流浪小狗。\n看着这只毫无用处的小废物，饿疯了的你脑海中不止一次闪过把它炖成肉汤的念头。\n\n但这地狱般的处境绝不会因为一锅肉而改善：北边是流着口水的食人族，西边是见人就杀的圣国行刑队，南方的帝国武士更是随时准备剿灭难民。\n听说大沙漠北方有叛军在招兵买马，带着你的狗，去那里赌一把命吧。',slave:'灼热的烈日无情地炙烤着后背，沉重的石块几乎要压断脊梁。\n在神圣教国的“重生镇”矿坑中，你没有名字，没有过去，只是无数麻木奴隶中的一个。\n你每天被强迫进行非人的劳作，只为了给虚无缥缈的神明建造一座毫无意义的巨大雕像。\n\n“快干活！异教徒！”圣骑士的怒吼伴随着皮鞭的破空声炸响，抽得你皮开肉绽。\n但在每个疼痛难忍的黑夜，你总会仰望星空，梦想着南方那传说中没有枷锁的自由土地，回忆着风中传来的、关于北方叛乱忍者势力的起义故事。\n也许，反抗的火种已在坑底点燃。',holy_sword:'你曾是一名四处逃窜的落魄通缉犯，为躲避各大势力赏金猎人的无尽追杀，被迫逃入了危机四伏的法外之地——沼泽地。\n在前往鲨鱼城的途中，你路过了一片血肉模糊的战场残骸。\n在习惯性地“摸尸”清扫时，你意外从烂泥与断肢中拔出了一件无价之宝：一把传说之剑“十字”亲手打造的传奇铭刃。\n或许是之前的拾荒者眼拙错过了它，但谁在乎呢？现在，它是你的绝世好剑了。\n\n如今，你带着这把与你落魄身份极不相符的惹眼武器，踏入了混乱无序、充斥着劣质大麻与帮派分子的鲨鱼城。\n酒馆里无数贪婪阴暗的目光正悄悄打量着你，而你传奇故事，便将从这片泥潭中拉开序幕。',holy_commoner:'你生于神圣教国，这片被奥克兰神明赐福的希望之地。\n只要每日虔诚祈祷并对祭司保持敬畏，你就能在拥有肥沃土壤与清净水源的乐土上，享受废土罕见的安宁。\n\n然而，日复一日的枯燥农作与刻板教条让你感到窒息，你内心燃起了对高墙外世界的渴望。\n即便牧师不断警告，教国边境之外是一片充满野蛮杀戮、异端横行，且到处游荡着巨大怪物的恐怖绝地，但这反而成了催化你冒险的毒药。\n今天，你终于背起行囊，站在了某座教国城镇的边缘。\n带着些许对神明的敬畏与对未知的好奇，你决定打破这安逸的牢笼，去亲眼见证真实的血肉世界。',rock_bottom:'毫无疑问，你的人生已经彻底跌破了谷底。\n你记不清遭遇了何种厄运，此刻的你正孤身一人，饥肠辘辘地瘫倒在广袤无垠、烈日炎炎的大沙漠荒野之中。\n你浑身上下一丝不挂，没有半个开币与防身武器。\n更让人绝望的是，断肢处钻心的剧痛正残酷地提醒你——你刚刚永远地失去了一条手臂。\n\n头顶是毒辣的太阳，不远处的沙丘后，随时可能窜出将人撕碎的剪嘴鸥，或是准备用镣铐将你套上颈环的游荡奴隶主。\n这是一场没有任何缓冲的残忍开局，在这片埋骨无数的黄沙中，祝你好运，残缺的求生者，死神已在向你招手了。',merchant:'在这个人命如草芥、强盗遍地走的废土上，多数人只求活过明天，而你却有着惊人的野心。\n你坚信“开币”才是这片大地上唯一绝对的权力与真理。\n\n此刻，你牵着一头背负行囊、偶尔打着响鼻的温顺驮兽，怀揣着辛苦攒下的第一桶金，站在大沙漠联合城某座城镇的熙攘市集边缘。\n你深知在此经商无异于刀口舔血：游荡的沙漠强盗、贪得无厌的贵族、随时准备索贿的守卫，都对你的货物虎视眈眈。\n但风险与暴利并存，你发誓要从倒卖廉价物资开始，在这可悲的世界中，建立起一个足以操纵势力的庞大贸易帝国。\n你的商队传奇，就此启程。',officer_son:'你曾是令人羡慕的军官子弟，父亲是联合帝国军队中一位功勋卓著、备受尊崇的长官。\n然而命运的重击不期而至——他在一次残酷的军事行动中不幸阵亡，你原本安稳的世界瞬间崩塌。\n\n更糟的是，一场突如其来的大火烧毁了你仅存的微薄积蓄，彻底断绝了退路。\n如今，你站在大沙漠联合城繁华却冷漠的街道上，腹中饥饿难耐，身无分文。\n你仅存的财产只剩单薄的衬衫，以及紧握手中、父亲生前最信赖的那把锋利佩刀。\n好在，父亲的荣誉为你留下了一丝底气——帝国依然将你视为盟友。\n拔出遗刃，你的家族复兴之路将从街角拉开帷幕。',male_slave:'你曾是一名风光无限的科技猎手，在废土的古遗迹间自由穿梭。\n但盲目的自信让你在一次探险中误入了“斯威士国”——那个绝对女权主义的严苛帝国。\n仅仅因为几句对女性不敬的粗心之言，你被剥夺了一切尊严与武力，戴上了屈辱的项圈。\n\n如今，在这座女性主导的堡垒中，你的地位甚至不如一只驮兽，只是一条必须摇尾乞怜的“公狗”。\n昔日的骄傲早被皮鞭抽得粉碎，主人鞋子的清脆声响正向你逼近，“要听话哦~”的戏谑低语在耳边萦绕。\n是要在摇尾中度过残生，还是隐忍蛰伏寻找机会咬断她们的喉咙？',cannibal_hunter:'“我真后悔踏进这片该死的食人族领地，这绝对是我这辈子最愚蠢的想法。”\n你躲在阴暗的血污角落里，浑身颤抖地听着外面令人毛骨悚然的咀嚼声与狂热的战歌。\n曾经，你带领着一支雄心勃勃的猎人小队，满脑子都是斩下食人族大统领的头颅去换取天价赏金。\n老罗本曾拼死警告过你，但被贪婪蒙蔽双眼的你执意不听。\n\n现在代价来了——你的队员们已经变成了外面火堆上的烤肉，而你正困在食人族首都的心脏地带。\n别发出任何声音，别被那些饥饿的野蛮人发现，用尽一切手段逃出这个人间的血肉屠宰场吧。',dark_daughter:'你背负着这片大陆上最妖冶也最绝望的诅咒。作为被圣国视为异端的“黑暗一族”，你们天生对欲望有着异于常人的渴求，连体液都是致命的催情剂。这让你们成为了圣骑士眼中必须被净化的“秽物”。\n为了躲避血腥屠杀，幸存的族人被迫逃入铁之谷，蜷缩在污秽的“娜尔可守望”中苟延残喘，终日不见天日。\n但你的降生打破了死寂——传说中，你拥有拯救全族的力量。\n擦干身上的污泥，握紧复仇的利刃吧，是时候杀出重围，夺回远胜此地百倍的荣光故乡了。',cannibal_unifier:'“呜哇！呜哇哇！”狂野的怒吼在黑暗之指的荒野中回荡。你并非人类眼中的文明人，而是光荣的“肉主部落”一员。\n南方来的那些虚伪的“食人族猎手”突袭了你们的营地，残忍地屠杀了你的家人。\n在这片贫瘠的大地上，你们不过是为了填饱肚子活下去而已，吃什么肉又有什么错？！\n复仇的火焰在你野蛮的血液中疯狂燃烧。拿起你的砍刀与骨棒，在阴影中伏击那些自诩正义的猎人吧。\n把他们剥皮拆骨，将他们的头颅高高悬挂在你的部族旗帜上，让这片大陆上的所有人都只能在你的名号前颤抖！',pirate_heir:'大陆上一直流传着海盗王那肆意妄为、劫掠如风的传奇故事，这让不甘平庸的你热血沸腾。\n为了追寻这片法外之地的极致浪漫，你长途跋涉，终于来到了传说中的“托尔图加”——一座围绕着巨大搁浅海盗船而建的混乱海盗镇。\n空气中弥漫着朗姆酒、汗臭的刺鼻气味。你站在这艘如钢铁巨兽般的废弃大船阴影下，心中暗暗发誓：你绝不在这残酷的废土上默默无闻。\n无论是作为心腹去协助那位高高在上的海盗王，还是在某个月黑风高之夜拔出刀子夺取他的名号，你都要让自己的威名在大陆上名垂千古。',brotherhood_prisoner:'“你是愿意当个一无所有的无名之辈，一辈子被那些脑满肠肥的贵族踩在脚下，最后像条长满寄生虫的野狗一样烂在路边？”\n“还是愿意跟我一样拿起刀，去抢去杀！就算活不到三十岁，也要让所有贵族听到你的名字就吓得尿裤子！！！”\n鲜血掠夺者的首领瓦拉姆站在高台上，声嘶力竭的狂热演讲在营地内回荡。\n作为刚被裹挟入伙的新兵，你的血液在酒精与煽动中沸腾。\n在这个只有无尽剥削与屠杀的世界里，与其屈辱地苟活，不如痛痛快快地拉几个贵族垫背。\n握紧发给你的那把破刀，准备迎接属于你的血腥洗礼吧！',freedom_seekers:'在这片腐朽的大陆上，你受够了城市里贵族们无休止的压榨，厌倦了那些沉重的税金和令人窒息的残酷法则。\n与其在别人的屋檐下苟延残喘，不如自己创造一个乌托邦。\n凭借着过人的口才与共同的信念，你集结了四名志同道合的伙伴。\n你们倾尽所有积蓄，换取了满满几大背包沉甸甸的建筑材料，毅然决然地踏入了荒野。\n这片废土固然危险，强盗、野兽随时会要了你们的命，但为了那份真正属于自己的自由，这一切都值得。\n放下第一根钢筋的地方，就是你们新帝国的起点。',mongrel_wanderer:'浓烈的灰白色雾气如同活物般在四周蠕动，遮蔽了阳光，也隔绝了希望。\n这里是臭名昭著的雾岛，而你正困在这片死地中心的孤城——蒙格勒。\n凄厉的惨叫声时不时穿透浓雾刺入耳膜，那是被雾人活生生啃食的倒霉蛋发出的绝望哀嚎。\n你不知道自己是如何迷失在这片恐怖地带的，但城外的每一寸土地都潜伏着那些盲目、贪婪的蓝色食人怪物。\n留在城里只能慢慢发疯；而想要活下去，你就必须握紧武器，依靠残存的理智与钢铁般的意志，在雾人的无尽包围中杀出一条血路又或者在这个城中衰老腐烂致死。',kral_choice:'沙克的血液在你体内沸腾，先祖克拉尔的英魂在向你呼唤！\n传说你是战神克拉尔的直系后裔，沙克王国真正的、也是唯一的合法领袖。\n然而如今，懦弱的女皇却坐在宝座上瑟瑟发抖，面对奥克兰人的步步紧逼，她唯一的计划竟是坐以待毙！\n难道骄傲的沙克族要眼睁睁等着圣国发动毁灭性的入侵吗？绝不！\n此刻，你蛰伏在一个隐蔽的废弃山洞中，擦拭着沾满血迹的巨剑。\n沙克人不需要怯懦的和平，去击碎那些软弱者的角，团结你的同胞，复兴沙克帝国的无上荣光！',fish_island_refugee:'刺鼻的鱼腥味与血腥气混合在湿润的海风中，你的鳞片上还沾染着同胞的鲜血。\n作为一名异类蜥蜴人，你刚刚经历了一场噩梦般的浩劫——恐怖的鱼形人如同潮水般摧毁了你们南方的家园。\n你拼死逃过大桥，终于瘫倒在这片名为“渔网”的难民聚集地。\n回头望去，彼岸的故土已经沦为那些滑腻野兽的狂欢屠宰场。\n你是该放下过去，拖着疲惫的身躯远远逃离这片是非之地苟且偷生？还是拿起生锈的鱼叉，集结剩下的残兵败将反杀回那个地狱？\n抉择权，就在你的手中。'},A=ul.find(e=>e.id===t.scenario),c=dl.find(e=>e.id===t.region),u=ml.find(e=>e.id===t.race),d=u?.subraces.find(e=>e.id===t.subrace),m={strength:'力量',dexterity:'敏捷',perception:'感知',constitution:'体质',will:'意志',intelligence:'智力',charisma:'魅力'},h=[...hl.attribute,...hl.life,...hl.fun],p=(t.traits.map(e=>{const t=h.find(t=>t.id===e);return t?`${t.title}：${t.description}`:e}).concat(t.customTraitName&&t.customTraitDescription?[`${t.customTraitName}：${t.customTraitDescription}`]:[]).join('；'),[u?.description??'',d?.description??''].join(' ')),f=(Array.from(new Set(p.match(/[^。！？\n]+（[^）]+）/g)||[])),e=>{const t={strength:0,dexterity:0,perception:0,constitution:0,will:0,intelligence:0,charisma:0},n=/(力量|敏捷|感知|体质|意志|智力|魅力)\s*([+-]\s*\d+)/g;let r=null;for(;null!==(r=n.exec(e));){const e=r[1],n=Number(r[2].replace(/\s+/g,''))||0;'力量'===e&&(t.strength+=n),'敏捷'===e&&(t.dexterity+=n),'感知'===e&&(t.perception+=n),'体质'===e&&(t.constitution+=n),'意志'===e&&(t.will+=n),'智力'===e&&(t.intelligence+=n),'魅力'===e&&(t.charisma+=n)}return t}),g=e=>{const t={};return e.traits.forEach(e=>{const n=h.find(t=>t.id===e);n&&(t[n.title]=n.description)}),e.customT t-xl md:text-2xl font-bold text-[#E7D8A6]',children:e}),(0,o.jsx)('span',{className:'text-xl md:text-2xl font-bold text-[#C2B280]',children:t}),(0,o.jsx)('span',{className:'text-white/85',children:n})]},r)}return(0,o.jsx)('p',{className:'leading-relaxed text-white/85',children:n},r)})})},yl=[{id:'summary',title:'完成'}],xl=[{id:'play_tutorial',title:'终末之诗：生存与进阶指南',description:'欢迎来到《终末之诗》！为了防止你在踏上旅途的第一天就因为搞不懂系统而原地去世，哔噗准备了这份“人教”版的新手指引。准备好了吗？beeeeeep！！！！！。',subTopics:[{id:'status_panel',title:'状态栏',content:'这里是你掌控全局的控制台，点开它，你能看到世界的一切：\n概览（查户口专用）： 这里是你（主角）的全部底细。兜里有几个子儿、穿的什么防具、拿的什么刀、当前是残血还是心情崩溃，甚至刚刚发生了什么倒霉突发事件，这里写得清清楚楚。\n小队（HR管理系统）： 你招募的伙伴都在这。你可以看他们的数据，也可以随时“优化”他们：\n踢出小队： 缘分已尽，对方会被扔进【视野】列表。\n暂时分别： 对方会被放入【异地】列表。这会直接影响你的【战斗栏】（打架的时候别指望他们能瞬移过来帮忙）。\n视野（立场探测器）： 路上遇到的所有人都在这里，无论他是想砍你的敌人、吃瓜的群众，还是你的盟友。\n重要提醒： 你可以点进去手动改变他们的立场。如果立场设为“敌对”，系统就会在战斗中把他们判定为识别变量。具体操作详情可参考DC教程。\n异地（队友云端寄存处）： 想跟小伙伴短暂分开？把他们丢这里就对了。比如你带一波人去探索右上角，把剩下的队友留在左下角。不用担心人物属性会丢失，后续可以根据剧情或主动召唤回来，且不会影响当前的战斗栏。\n情报（废土吃瓜周刊）： 你的敌对势力、盟友动向、世界局势，以及你走在路上听到的流言蜚语，统统记录在此。\n日志（打工人备忘录）： 你接下的所有任务都会按顺序记录在这里。\n往事（你的记仇本与回忆录）： 你干过的好事、坏事、跟谁结了缘、跟谁喝过酒、甚至顺手宰了谁，这里都会帮你记着。\n地图： 字面意思，终末之诗的世界全图。'},{id:'combat_panel',title:'战斗栏',content:'触发方式： 只能通过【选项栏】里的“战斗”选项单独触发。\n不要指望系统会为了讨好玩家而开绿灯，所有的战斗数据完全基于脚本代码计算。战斗栏内置了详细教程，这里只强调一点：\n避坑指南：  如果你兴冲冲点开了【战斗栏】，却发现“拔剑四顾心茫然”（没有敌人）？请立刻去【状态栏】->【视野】里看看，是不是AI没有把对方的立场调成“敌对”！如果他还是中立，系统是不允许你乱砍人的（修改立场详情请看DC教程），你也可以点进去在其右上角的小齿轮处修改立场(是的，你甚至可以把卡特龙直接变成)。'},{id:'option_panel',title:'选项栏',content:'非常重要： 游戏里几乎所有的前端内容和剧情推进都围绕着选项栏展开。\n留意右上角的“小齿轮”，里面藏着三大功能：战斗、营地、百科全书。\n它还会直接影响你掷骰子的剧情流程，想玩转剧情，记得去看DC教程。'},{id:'camp_system',title:'营地系统',content:'这是作者“哔噗”最喜欢的系统。打打杀杀累了？来营地跟伙伴们聊聊天、互相慰藉。\n除了战斗和做任务，这里是获取属性的核心方式：在营地里进行训练，就能变强。\n官方外挂（内置工具栏）：\n营地里提供了两个任性选项：无限beep（无限重roll） 和 无惩罚模式（属性不会减损）。你可以通过选项栏随时召出营地系统来体验。'},{id:'attribute_usage',title:'属性用途',content:'战斗栏里有详细的公式解析，这里只做最简单的科普：\n力量： 决定你砍人有多疼，以及你能背多少捡来的垃圾（负重）\n敏捷： 决定你闪避有多骚、攻速有多快，以及你的“第三只手”偷东西有多利索。\n体质： 决定血量上限。体质越高，命越硬。\n智力： 废土托尼·斯塔克专属。智力越高，你在营地里敲打出来的武器和防具就越极品。\n意志： 决定你的心情上限。意志高的人，泰山崩于前而面不改色；意志低的人，踩到狗屎都会emo一整天。\n魅力： 将来会影响NPC对你的初始好感度（没错，就是看脸，但目前还在画大饼，暂未实装）。'},{id:'extra_model_parse',title:'额外模型解析',content:'关于跑团使用的AI模型，哔噗认为：\n3F： 绝对的下下策，哔噗写卡烦躁就是因为他。\n2.5p： 体验不错，beeep！推荐。\n小克（Claude）： 大神级别，有条件无脑选小克就完事儿了！'},{id:'weapons_and_gear',title:'武器与装备',content:'武器和装备是本卡的灵魂！\n武器种类：\n武士刀、钝器、军刀、砍刀、长柄刀、大型类、弓、弩、武术，它们不仅影响剧情耍帅，攻速和效果也完全不同。\n天下武功，唯快不破： 武士刀 / 军刀（初始攻速 2，且可以+4）\n不快不慢，节奏正好： 砍刀 / 长柄刀（初始攻速 2，且可以额外+3）\n一力降十会： 钝器 / 大型类（初始攻速 1，且可以额外+2）\n\n装备（护甲）分类：\n无甲 | 轻甲 | 中甲 | 重甲。\n护甲越厚，DR（防护值）越高，但带来的敏捷惩罚也越重。\n战斗核心博弈（敲黑板必考！）：\n切割 vs 钝伤： 攻速越快的武器（比如武士刀），划人越疼（切割伤害高），但砸人没力气（钝伤低）；反之，攻速慢的武器（比如大锤），切割低，但一锤子下去能把人脑壳敲碎（钝伤高）。\n护甲的阿喀琉斯之踵： DR值（护甲）可以完美挡住所有“切割伤害”，但挡不住“钝伤”！\n这意味着什么？ 穿上重甲，别人拿武士刀砍你就像在刮痧；但如果对面掏出一把大铁锤砸过来，你的重甲就是个铁棺材。\n等价交换： DR越高，护甲越厚，你的敏捷就越低。当你决定穿上重甲成为一个肉盾时，你就必须接受自己跑得比乌龟还慢的现实。鱼和熊掌不可兼得哦！（各种武器的独立伤害详解，请去【百科全书】里查阅。）\n\n祝你在《终末之诗》活得久一点，BEEEEEP！'}]},{id:'history',title:'故事历史',subTopics:[{id:'ancient',title:'远古时期古人',content:'远古时期古人（几千年前）\n第一帝国：一个强大而且技术先进的文明，有自动化工厂、卫星、基因工程、巨型机器人和太空电梯技术。不知道他们存在了多久，他们的敌人是什么，他们的势力范围有多远，甚至他们是否是 Kenshi 世界的本土生物都不清楚。与现代相比，第一帝国的科技发展已经到了神级的水平。研究表明在第一帝国时期存在着两个文明，第一个文明发展极为先进也更成熟，分布较为集中。另一个文明主要在洪泛地的北部（也许是现今的食人族平原），科技比前一个时代落后一点。\n\n巨兽之战：在某些时候，第一帝国和一个未知的敌人爆发了一场战争（也许就是上文的另一个文明），擎天的巨兽参与了战争。战争造成了巨大的破坏，古人们开始担心使用它们的后果。\n服从之地：由于他们害怕巨兽，古人们决定把他们处理掉。利用机器的绝对忠诚，古人命令巨兽们进入一个巨大的坑，然后用滚烫的金属杀死了他们的仆人。\n混沌时代：这个时期发生了许多的灾难，从危险的天体活动，到自然灾害，到瘟疫，再到骨人叛乱。目前还不清楚究竟发生了什么，但它使古人的伟大帝国轰然倒塌，人类濒临灭绝。《牺牲之书》记载道“伟大之父”奇特林“为心爱的孩子牺牲了自己。为了给他们一个新的生活机会，他清理了这个星球的疾病。”长者声称，名为“伟大的斯托伯”的骨人烈士是“人类瘟疫的灭绝者”，并且由于他在“人类战争”中的牺牲，帮助“将土地重置为原来的纯洁”。（存疑，因为玩家骨人角色与长者对话时还说“这只是一个谎言”。）'},{id:'second_empire',title:'第二帝国（3000多年前）',content:'第二帝国成立：在混沌时代之后数百或数千年，为了在人类的眼中为他们过去的行为赎罪，卡特龙和他的追随者们建立了一个帝国并研究古代帝国的遗迹，尝试重建以前的科技，重建骨人和人类和平共处的局面。卡特龙的手下有蒋将军、帽子-12 将军、犀牛机器人、农业之首，这五人也许就是第二帝国的中流砥柱。\n食人族自相残杀：在某个无法确定的时间因为无法确定的原因，居住在西北的人类有了易子相食的行为，开始尝试食用新鲜人肉。大批人类开始自相残杀并相互食用。卡特龙帝国花费了大批的资源来对抗这些食人族。后来还产生了一个广为人知的军事团体“液压骑士”。食人族的传说里描绘过一个“不可食之人”的骨人战士。这个人有极大的可能就是液压骑士之一，液压骑士的领袖就是蒋将军。\n第二帝国崩溃之始：虽然建立的目的很好，但为了保持表面的和平，帝国变得越来越残暴。不能判定道德标准的犀牛机器人将儿童关进监狱。帽子-12 将军打击宗教信仰，蒋将军为了清除海盗和食人族大批屠杀人类，甚至是自己人，大大加剧了民众之间的紧张关系。虽然科学和考古学蓬勃发展，但仍是表面现象。意外发生了，方格地发生爆炸，爆炸造就了环形山。\n\n第二帝国的沦陷，圣国的建立：虽然这个时期的细节很少（而且大多存疑），但正是在这个时候，一位伟大的人类领袖站了出来，聚集了他的追随者，发动了叛乱。传说称他为菲尼克斯，菲尼克斯是奥克兰最强的战士，是永恒圣火的持有者。第二帝国不能平定叛乱，开始分崩离析。叛军驱逐了卡特龙和他的追随者，新建立了一个帝国，这个帝国将成为历史上最悠久的帝国之一。\n黑色沙漠城的建立：骨人幸存者受到了奥克兰人的严重迫害，被迫为犯下的反人类罪付出代价。许多骨人联合起来，撤退到世界上最危险的土地之一，在那里，没有人追捕他们，他们隐藏多年，与世界完全隔离，反思着是什么导致了他们现在的处境，直到现在。'},{id:'mid_history',title:'中期（100-3000年前）',content:'蜂巢族的出现：目前尚不清楚蜂巢族是何时出现或如何出现的，但很明显他们在卡特龙帝国时期并不存在，至少不像现在蜂巢族的外貌。无论它们是从人类变异而来，还是仅仅来自大洋彼岸的另一片土地，它们都出现了，并从此成为土地的居民。后面他们内部分裂了许多部族，疯狂斗争。\n沙克族的出现：虽然在卡特龙帝国期间可能存在沙克族，甚至追溯到远古时代都可能存在，但他们以前和现在的样子大有区别。他们以前更像是正常人类，还没有现如今的角。那时的沙克族被称为执法者。不知道他们在帝国扮演什么角色。被赋予这个称号，他们可能是军人阶级，保护主人也许就是他们的任务。如果他们在菲尼克斯反抗期间参与了镇压的话，那这可以解释为什么奥克兰人认为他们是“黑暗的仆人”。然而，真相已经随着时间的流逝而消失了。\n克拉尔之死：从人们记事开始，沙克就是生活在荒野中的简单部落，经常分裂和交战。有一段时间，一个名叫克拉尔的伟大武士把部落统一成一个强大的王国，教给他的追随者一个荣誉和力量的准则，并带领他们走上征服的征程。然而最终，他在与敌军的战斗中被杀，传说敌军的人数超过他百倍。他死后，追随者们对他的崇拜达到了近乎神一般的程度，他们只想在一场像他这样的伟大战斗中死去。因此，从那时起，他们对待邻居的方式，就一直是战争和掠夺。'},{id:'modern',title:'近代史（0-100年）',content:'菲尼克斯六十二世的诞生：作为圣国的传统，第 62 任菲尼克斯在出生后不久就被从他的亲生父母身边带走，由大祭司单独抚养长大。在这里，他被灌输了奥克兰宗教的理念，并教授他统治帝国所需的所有技能。据说第 62 代菲尼克斯是神圣国家历史上最残忍的菲尼克斯，在 16 岁时审判自己的家人，并判处他们在圣火中净化。\n红色叛乱：几十年前，南方平原遭受了一场严重的干旱，导致了一场严重的饥荒，几乎使联合城所有人集体屈服。由于饥荒，南方城市被迫依靠商人行会给他们带来生存所需的物资，不幸的是，强盗和沙克袭击者封锁了路线，并抢走了这些物资。在贵族们的互相博弈中，他们无动于衷，下层阶级被迫挨饿而发动叛乱。由此引发的战斗夺去了许多人的生命，包括许多贵族，甚至先皇，安西皇帝本人也死亡，但叛军最终没能成功，存活下来的人被奴役。贵族圈子里选出了一位新皇帝——天狗皇帝，一个以缺乏常识而闻名的残忍而冲动的人。\n巴斯特城的毁灭：巴斯特曾经是一个繁荣富饶的地区，到处都是可供交易的农田和城镇。然而，当圣国发动攻击时，一切都改变了。圣国的军队入侵了联合城的巴斯特城，“仅在一天之内”就将其摧毁，活活烧死了那里的贵族，并将年轻人抓走送往重生镇。从那以后，这片土地就成了一个战争地带。\n卢金的复仇：卢金和他的家人在很小的时候就被卖为奴隶，在那里他们因在矿场工作而遭受殴打，常常饥饿疲惫。最终，他的父亲屈服于可怕的环境，要杀死卢金和他的母亲。他的母亲设计了一个逃脱计划来救她的儿子，最终以牺牲自己的生命为代价，她成功地让卢金逃了出去。14 岁时，饥寒交迫的他独自一人在沙漠中，被一群忍者发现并收留，忍者训练他潜行和暗杀的艺术。7 年后，他回到家乡寻仇，用他的技能追踪和暗杀一个又一个贵族。最终卢金被逮捕，并作为罪犯在街上游行，然后被送往天狗的地牢，在那里他遭受了许多酷刑，包括被迫写一本书向天狗皇帝致敬。\n沼泽地的纷争：在大格琳成为沼泽地的老大以前，沼泽地最大的统治者是大哈希和他的跟踪者帮。然而大格琳暗中挑拨黑色转换者和跟踪者帮的关系，促使两个帮派的矛盾越来越深。直到大格琳的猎犬帮与黑色转换者联手密谋埋伏了大哈希，使得跟踪者帮被一举击溃，大格琳终于夺取了沼泽地老大的位置，其他各帮派都听命于她。\n推翻沙格尔国王：沙格尔是上任沙克国王。像大多数沙克族一样，他把战斗视为荣誉，战死是最高的荣誉。在他的统治下，沙克族不断与圣国和联合城的战斗，大量沙克族死亡，沙克王国正在崩溃。沙格尔王提出了近乎自杀的最后方案，不管剩下有什么战士。对此，战士巴彦大声疾呼抗议。沙格尔怒不可遏，但是艾萨塔，石魔出来喊道：“这个人说的是实话。你想要巴彦闭嘴，就从我的尸体上跨过去”。刀光剑影后，石魔赢得胜利，那天标志着石魔统治的开始，巴彦在她身边辅助她。她把她的战士们从前线拉出来，与联合城和平相处，并开放边境与其他种族进行贸易。虽然她的一些战士提出了抗议，但她决心确保她的人民生存到未来，即使这意味着摧毁他们一些长期持有的理想和传统。'},{id:'end_poem',title:'终末之诗',content:'圣国改革：出现了一位锻造大师，集武器锻造和盔甲锻造于一身的天才，他不仅加强了圣国盔甲，更是提高了圣国的武器水平。由于人们富足，奥克兰地区建起了一做新城——瑞斯特，并且周边的农村也得到了发展。为了加强政教合一，圣国祭司建立了朝圣城镇——恩勒门特，用来弘扬和培养奥克兰的接班人。\n联合城改革：不甘示弱建立了两座堡垒，为了补给这两座堡垒而建立起来的城镇——珍珠镇靠着独特的地理优势一跃成为了仅次于赫夫特的联合城城镇。为了加强补给，联合城也引入新军阀，其中最大的就是汉城。联合城的实力进一步扩大，工艺技术也得到了提高，精锐士兵的盔甲也变成了黑金武士甲。\n沙克王国改革：同属三大国的沙克王国也不甘落后，发展出了属于自己的牧场经济，并用斯坦沙漠中特有的青铜矿锻造出了精锐穿的青铜甲。石魔也戴上了沙克王国祖传的沙克王冠，并成为了沙克皇族。狂战士因为疯狂的战斗吸引了大批的沙克族加入，成为了数一数二的土匪势力，并迁居到了狂战士之国区域，飞牛率领的克拉尔之选也展露出了獠牙。\n斯威士国创立：在夹缝中生存的圣国逃犯越聚越多，逐渐占领了枢纽城等周边小哨站，一部分成立了女拳，越过沼泽和南方湿地到了钩子海岸建立起了斯威士教国，成为了女性为尊的盗版圣国。\n雾岛进化：雾岛深处也发生了异变，雾人因为缺少女王而导致退化，但五十年过去，有一个蜂巢王子转化为了雾人女王，所有雾人都获得了进化，并且智力也得到了提高。在服从地区的雾人因为受到死去的巨型骨人干扰，逐渐机械化，最终进化出了薄雾之母，一个新型种族，并且更加残暴，蒙格勒也变得更加不安全。\n黑暗蜂巢诞生：曾经四大古老蜂巢（死寂、西、南、黑暗）之一的黑暗蜂巢也逐渐展现在世人面前，可惜势力已经进入到了暮年，导致很多黑暗蜂巢叛离了黑暗女王，成立了自己的土匪势力黑暗掠夺者。死寂蜂巢流亡者进化为异种蜂巢，成立陨落蜂巢族，当年的事情皆在这个势力当中留存。\n食人族分化：食人族在时间的流逝中分裂为各个部落，一方是大巫部落，另一方是肉主部落，互为死敌。\n沙丘叛军复仇：曾经在红色叛乱中失去贵族身份的贵族终于发展出了自己的势力沙丘叛军，并开始对联合城进行复仇。\n索黑教成立：初衷就是自由民主，去解放奴隶，消灭贪嗔痴，感化南部蜂巢，同时历练己身，以武会友。\n海盗回归：第二帝国时期被击溃的海盗遗迹被人发现，海盗王和绿胡子共同开发遗迹，导致海盗势力突飞猛进。绿胡子率领的草之海盗因为不愿臣服于海盗王，接在禁岛建立基地，海盗王则是在绿色海滩附近成立了最大的海盗城镇。\n沼泽壮大：沼泽势力也开始壮大，因为沼泽的无秩序，导致很多逃犯跑到沼泽地落草为寇并和赤色军刀团与一个神秘高手领袖——彩虹组成了四色刀客团。同时沼泽地中的猎犬建立了大麻基地，黑色转换者建立了金库，双刃团建立了一个城镇，格雷剥皮帮建立了一个走私黑市，曾经被消灭的追踪者家族也死灰复燃，沼泽居民为了求生，跟随堕落贵族建立了根源镇。'}]},{id:'background',title:'本卡特点',description:'KENSHI-终末之诗改编自【STEAM】游戏的 Kenshi 以及模组【终末之诗】内容，你将踏足一片广袤大陆。\n18 个剧本开局各不相同，各有各的传奇故事。\n30+ 派系林立：大派系内有腐朽与叛乱，外有强敌伺机而动。你可以选择加入一方协助称霸大陆，也可自立门户，从无名之辈到名震大陆。30+ 区域风貌各异，地貌环境与新派系完全不同，确保不落同质化，让每一段冒险都新鲜。\n180+ 特殊角色让你遇到的每个人都鲜活真实，表面特质与世界书语料、性格设定相互呼应——是与他们战斗夺取装备，还是深入了解、共赴恋情或一统冒险，由你决定。\n目前已有 10+ 阵营任务可参与。\n\n独立的战斗系统让你无需担心 AI 计算失误；武器与护甲体系让每一种装备各司其职；特殊肢体创伤机制意味着一旦失去，或许就再也回不来了。'},{id:'survival',title:'游玩注意',description:'【本卡为免费制作为爱发电】\n\n问：世界书条目好多，会不会爆 token\n答：作者自玩时候暂时未出现爆 token 情况，本卡强烈建议使用【额外模型解析】，
