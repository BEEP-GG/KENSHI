
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kenshi状态栏</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-deep: rgba(12, 12, 15, 0.95);
        --bg-panel: rgba(35, 33, 30, 0.6);
        --accent-gold: #c1a35f;
        --accent-bronze: #8b6d4d;
        --accent-rust: #8b3a3a;
        --accent-green: #2b8a3e;
        --text-main: #e0dacc;
        --text-dim: #9e968b;
        --font-header: 'Cinzel', 'KaiTi', '楷体', serif;
        --font-body: 'Georgia', 'serif', 'KaiTi';
        --border-style: 1px solid rgba(193, 163, 95, 0.3);
        --accent-danger: #e74c3c;
        --accent-positive: #2ecc71;
        --accent-yellow: #f1c40f;
      }

      body {
        font-family: var(--font-body);
        background: transparent;
        margin: 0;
        padding: 10px;
        color: var(--text-main);
        user-select: none;
        overflow-x: hidden;
        font-size: 16px;
      }

      .main-container {
        width: 100%;
        max-width: 1200px;
        background: var(--bg-deep);
        border: 1px solid var(--accent-bronze);
        backdrop-filter: blur(8px);
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        margin: 0 auto;
        border-radius: 3px;
        transition: all 0.4s ease;
      }

      .top-bar {
        background: linear-gradient(180deg, rgba(30, 25, 20, 1), rgba(30, 25, 20, 0.5));
        border-bottom: var(--border-style);
        padding: 12px 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: var(--font-header);
        position: relative;
        z-index: 10;
      }

      .top-left {
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .top-right {
        display: flex;
        align-items: center;
        gap: 20px;
        color: var(--accent-gold);
        font-weight: bold;
      }

      .day-badge {
        font-size: 1.2em;
        color: var(--accent-gold);
        border-right: 1px solid #555;
        padding-right: 20px;
      }
      .location-info {
        font-size: 1.1em;
        color: var(--text-main);
        letter-spacing: 0.5px;
      }

      .toggle-btn {
        background: transparent;
        border: 1px solid var(--accent-bronze);
        color: var(--accent-gold);
        width: 30px;
        height: 30px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          transform 0.4s ease,
          background 0.3s;
        font-size: 0.8em;
      }

      .main-container.collapsed .toggle-btn {
        transform: rotate(-90deg);
      }
      .collapsible-content {
        max-height: 2000px;
        overflow: hidden;
        opacity: 1;
        transition:
          max-height 0.5s ease-in-out,
          opacity 0.4s ease-in-out;
      }
      .main-container.collapsed .collapsible-content {
        max-height: 0;
        opacity: 0;
      }

      .nav-tabs {
        display: flex;
        justify-content: center;
        background: rgba(0, 0, 0, 0.4);
        border-bottom: var(--border-style);
        margin-bottom: 5px;
      }
      .tab-btn {
        padding: 12px 30px;
        cursor: pointer;
        font-family: var(--font-header);
        color: var(--text-dim);
        transition: 0.3s;
        border-bottom: 3px solid transparent;
      }
      .tab-btn.active {
        color: var(--accent-gold);
        border-bottom: 3px solid var(--accent-gold);
        background: linear-gradient(to top, rgba(193, 163, 95, 0.1), transparent);
      }

      .content-area {
        padding: 25px;
        min-height: min(85vw, 820px);
        max-height: min(85vw, 820px);
        overflow-y: auto;
      }
      .content-area::-webkit-scrollbar {
        width: 6px;
      }
      .content-area::-webkit-scrollbar-thumb {
        background: var(--accent-bronze);
        border-radius: 3px;
      }

      .tab-pane {
        display: none;
      }
      .tab-pane.active {
        display: block;
        animation: fadeIn 0.3s;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .section-box {
        background: var(--bg-panel);
        border: 1px solid rgba(193, 163, 95, 0.2);
        padding: 20px;
        margin-bottom: 20px;
      }
      .section-title {
        font-family: var(--font-header);
        color: var(--accent-gold);
        font-size: 1.1em;
        border-bottom: 1px solid rgba(193, 163, 95, 0.3);
        margin-bottom: 15px;
        padding-bottom: 5px;
      }

      .event-text {
        font-style: italic;
        line-height: 1.6;
        color: var(--text-main);
        padding: 10px;
        border-left: 3px solid var(--accent-gold);
        background: rgba(193, 163, 95, 0.05);
      }

      .desc-text {
        color: #888;
        font-size: 0.95em;
        font-style: italic;
        margin-bottom: 20px;
        padding: 0 5px;
        border-left: 2px solid #444;
        line-height: 1.5;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 20px;
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
        gap: 10px;
      }

      .stat-item {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid #444;
        padding: 8px 4px;
        text-align: center;
        cursor: help;
      }
      .stat-item:hover {
        border-color: var(--accent-gold);
        background: rgba(193, 163, 95, 0.1);
      }
      .stat-item.stat-clickable {
        cursor: pointer;
        border-color: rgba(193, 163, 95, 0.6);
      }
      .stat-item b {
        display: block;
        color: var(--accent-bronze);
        font-size: 0.85em;
        margin-bottom: 4px;
      }

      .points-summary {
        display: flex;
        gap: 15px;
        margin-bottom: 15px;
        flex-wrap: wrap;
        padding-bottom: 10px;
        border-bottom: 1px dashed rgba(193, 163, 95, 0.2);
      }
      .point-tag {
        background: rgba(193, 163, 95, 0.1);
        border: 1px solid var(--accent-gold);
        padding: 2px 10px;
        font-size: 0.85em;
        color: var(--accent-gold);
        border-radius: 2px;
      }

      .status-badge {
        font-size: 0.8em;
        padding: 1px 6px;
        border-radius: 2px;
        margin-left: 8px;
        vertical-align: middle;
        border: 1px solid #555;
        color: #aaa;
      }
      .status-badge.danger {
        border-color: var(--accent-danger);
        color: var(--accent-danger);
      }
      .status-badge.warn {
        border-color: #f39c12;
        color: #f39c12;
      }

      .status-row {
        margin-bottom: 15px;
      }
      .status-header {
        display: flex;
        justify-content: space-between;
        font-size: 0.9em;
        margin-bottom: 5px;
      }
      .bar-container {
        height: 8px;
        background: #222;
        border: 1px solid #444;
      }
      .bar-fill {
        height: 100%;
        box-shadow: 0 0 8px currentColor;
        transition: width 0.4s;
      }
      .bar-hp {
        background: #8b3a3a;
        color: #8b3a3a;
      }
      .bar-exp {
        background: #c1a35f;
        color: #c1a35f;
      }
      .bar-morale {
        background: #3498db;
        color: #3498db;
      }

      .char-card {
        background: linear-gradient(90deg, rgba(40, 40, 45, 0.9), rgba(30, 30, 35, 0.6));
        border: 1px solid rgba(193, 163, 95, 0.2);
        padding: 12px 20px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        transition: 0.2s;
      }
      .char-card:hover {
        border-color: var(--accent-gold);
        transform: translateX(5px);
      }

      .tag-box {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .item-tag {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid #555;
        padding: 3px 8px;
        font-size: 0.9em;
        cursor: help;
      }
      .item-tag:hover {
        border-color: var(--accent-gold);
        background: rgba(193, 163, 95, 0.1);
      }

      .faction-pill {
        padding: 2px 8px;
        border: 1px solid #555;
        margin-right: 8px;
        font-size: 0.8em;
        cursor: help;
      }

      #tooltip {
        position: fixed;
        background: rgba(15, 15, 20, 0.98);
        border: 1px solid var(--accent-gold);
        color: #fff;
        padding: 12px;
        z-index: 99999;
        display: none;
        pointer-events: none;
        font-size: 0.9em;
        line-height: 1.5;
        white-space: pre-wrap;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.8);
        max-width: 300px;
      }

      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 1000;
        display: none;
        justify-content: center;
        align-items: center;
        animation: fadeIn 0.2s;
      }

      .confirm-modal {
        background: var(--bg-deep);
        width: 90%;
        max-width: 420px;
        border: 1px solid var(--accent-gold);
        padding: 24px;
        box-shadow: 0 10px 50px rgba(0, 0, 0, 0.8);
        text-align: center;
      }
      .confirm-title {
        font-family: var(--font-header);
        color: var(--accent-gold);
        font-size: 1.1em;
        margin-bottom: 12px;
      }
      .confirm-actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 18px;
      }
      .confirm-btn {
        background: transparent;
        border: 1px solid var(--accent-bronze);
        color: var(--accent-gold);
        padding: 6px 16px;
        cursor: pointer;
        font-family: var(--font-header);
        transition: 0.2s;
      }
      .confirm-btn:hover {
        border-color: var(--accent-gold);
        background: rgba(193, 163, 95, 0.1);
      }
      .confirm-btn.danger {
        border-color: var(--accent-danger);
        color: var(--accent-danger);
      }
      .confirm-btn.danger:hover {
        background: rgba(231, 76, 60, 0.12);
      }
      .modal-content {
        background: var(--bg-deep);
        width: 90%;
        max-width: 1200px;
        border: 1px solid var(--accent-gold);
        padding: 40px;
        max-height: min(90vw, 820px);
        overflow-y: auto;
        position: relative;
        box-shadow: 0 10px 50px rgba(0, 0, 0, 0.8);
      }
      .close-btn {
        position: absolute;
        right: 20px;
        top: 20px;
        background: none;
        border: none;
        color: var(--accent-gold);
        font-size: 2em;
        cursor: pointer;
      }

      .mission-item {
        border: 1px solid #444;
        background: rgba(0, 0, 0, 0.2);
        margin-bottom: 8px;
      }
      .mission-header {
        padding: 12px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        background: rgba(255, 255, 255, 0.03);
      }
      .mission-body {
        display: none;
        padding: 15px;
        border-top: 1px solid #444;
        font-size: 0.95em;
        color: #ccc;
      }
      .mission-item.open .mission-body {
        display: block;
      }
      .mission-description {
        font-style: italic;
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px dashed #444;
      }
      .subtask-desc {
        font-size: 0.85em;
        color: #aaa;
        margin: 4px 0 6px;
        line-height: 1.4;
      }
      .mission-reward {
        font-weight: bold;
        color: var(--accent-gold);
        margin-bottom: 15px;
      }
      .subtask-list {
        list-style: none;
        padding-left: 10px;
        margin: 0;
      }
      .subtask-item {
        margin-bottom: 12px;
        padding-left: 15px;
        border-left: 2px solid #555;
      }
      .subtask-item.completed {
        border-left-color: var(--accent-green);
      }
      .subtask-item.completed .subtask-name {
        color: #888;
        text-decoration: line-through;
      }
      .subtask-name {
        font-size: 0.9em;
        margin-bottom: 4px;
      }
      .subtask-progress-container {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .subtask-progress-bar-container {
        flex-grow: 1;
        height: 6px;
        background: #222;
        border: 1px solid #555;
      }
      .subtask-progress-bar {
        height: 100%;
        background: var(--accent-bronze);
        transition: width 0.4s;
      }
      .subtask-progress-text {
        font-size: 0.85em;
        color: #888;
        min-width: 50px;
        text-align: right;
      }

      .past-item {
        border: 1px solid #444;
        background: rgba(0, 0, 0, 0.2);
        margin-bottom: 10px;
        padding: 12px 14px;
      }
      .past-date {
        font-family: var(--font-header);
        color: var(--accent-gold);
        font-size: 0.95em;
        margin-bottom: 6px;
      }
      .past-desc {
        color: #ccc;
        line-height: 1.5;
      }
      .past-controls {
        display: grid;
        grid-template-columns: 140px 1fr auto;
        gap: 10px;
        margin-bottom: 16px;
      }
      .past-input,
      .past-textarea {
        width: 100%;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid #444;
        color: var(--text-main);
        padding: 8px 10px;
        font-family: var(--font-body);
      }
      .past-textarea {
        min-height: 60px;
        resize: vertical;
      }
      .past-add-btn,
      .past-delete-btn {
        background: transparent;
        border: 1px solid var(--accent-bronze);
        color: var(--accent-gold);
        padding: 6px 12px;
        cursor: pointer;
        font-family: var(--font-header);
        transition: 0.2s;
      }
      .past-add-btn:hover {
        border-color: var(--accent-gold);
        background: rgba(193, 163, 95, 0.1);
      }
      .past-delete-btn {
        border-color: var(--accent-danger);
        color: var(--accent-danger);
        margin-top: 10px;
      }
      .past-delete-btn:hover {
        background: rgba(231, 76, 60, 0.12);
      }

      .map-frame-wrap {
        border: 1px solid rgba(193, 163, 95, 0.25);
        background: rgba(0, 0, 0, 0.35);
        padding: 10px;
        position: relative;
      }
      #map-root {
        width: 100%;
        aspect-ratio: 16 / 9;
        max-height: min(70vw, 720px);
        border: 1px solid #444;
        background: #0c0c0f;
      }
      #map-root .h-screen {
        height: 100%;
      }

      /* 响应式布局：手机 / 平板 / 桌面 */
      @media (max-width: 480px) {
        body {
          padding: 6px;
          font-size: 14px;
        }
        .top-bar {
          padding: 10px 12px;
          flex-wrap: wrap;
          gap: 8px;
        }
        .top-left,
        .top-right {
          gap: 10px;
          flex-wrap: wrap;
          width: 100%;
          justify-content: space-between;
        }
        .day-badge {
          padding-right: 10px;
          border-right: none;
        }
        .location-info {
          width: 100%;
        }
        .nav-tabs {
          flex-wrap: wrap;
        }
        .tab-btn {
          padding: 8px 10px;
          flex: 1 1 44%;
          text-align: center;
        }
        .content-area {
          padding: 12px;
          min-height: min(120vw, 640px);
          max-height: min(120vw, 640px);
        }
        .section-box {
          padding: 14px;
        }
        .detail-grid {
          grid-template-columns: 1fr;
        }
        .stat-grid {
          grid-template-columns: repeat(auto-fit, minmax(64px, 1fr));
        }
        .char-card {
          flex-direction: column;
          align-items: flex-start;
          gap: 8px;
        }
        .status-header {
          font-size: 0.82em;
        }
        .past-controls {
          grid-template-columns: 1fr;
        }
        .modal-content {
          padding: 20px;
          width: 94%;
        }
        .map-frame-wrap {
          padding: 6px;
        }
        #map-root {
          aspect-ratio: 4 / 3;
          max-height: min(100vw, 520px);
        }
      }

      @media (min-width: 481px) and (max-width: 1024px) {
        body {
          font-size: 15px;
        }
        .content-area {
          padding: 18px;
          min-height: min(95vw, 760px);
          max-height: min(95vw, 760px);
        }
        .detail-grid {
          grid-template-columns: 1fr;
        }
        .stat-grid {
          grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
        }
        #map-root {
          max-height: min(75vw, 680px);
        }
      }

      @media (min-width: 1025px) {
        .content-area {
          min-height: min(70vw, 820px);
          max-height: min(70vw, 820px);
        }
        #map-root {
          max-height: min(70vw, 720px);
        }
      }
    </style>

    <script type="module">
      function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.tab-btn[data-tab="${tabName}"]`).classList.add('active');
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.getElementById(`pane-${tabName}`).classList.add('active');

        if (tabName === 'map') {
          window.dispatchEvent(new Event('kenshi-map-mount'));
          window.dispatchEvent(new Event('kenshi-map-visible'));
        }
      }
      function closeModal() {
        const modalContent = document.getElementById('modal-content-inner');
        if (modalContent) modalContent.scrollTop = 0;
        document.getElementById('char-modal').style.display = 'none';
      }
      function openModal() {
        const modalContent = document.getElementById('modal-content-inner');
        if (modalContent) modalContent.scrollTop = 0;
        document.getElementById('char-modal').style.display = 'flex';
      }

      function toggleMission(ele) {
        ele.parentElement.classList.toggle('open');
      }
      function toggleCollapse() {
        $('.main-container').toggleClass('collapsed');
      }

      window.switchTab = switchTab;
      window.closeModal = closeModal;
      window.toggleMission = toggleMission;
      window.toggleCollapse = toggleCollapse;

      const attrTooltips = {
        STR: '力量 (STR)\n影响近战伤害、重武器使用能力以及负重上限。',
        DEX: '敏捷 (DEX)\n影响攻击速度、闪避率、潜行效果及格挡效率。',
        PER: '感知 (PER)\n影响远程射击精度、侦测潜行敌人的能力。',
        TGH: '体质 (TGH)\n决定生命值上限、伤害减免及对环境的抵抗力。',
        WIL: '意志 (WIL)\n影响士气、抵抗精神攻击及昏迷后的苏醒速度。',
        INT: '智力 (INT)\n决定学习技能的速度，影响工程与医疗效果。',
        CHA: '魅力 (CHA)\n影响交易价格及说服他人的成功率。',
      };
      const attrLabels = {
        STR: '力量',
        DEX: '敏捷',
        PER: '感知',
        TGH: '体质',
        WIL: '意志',
        INT: '智力',
        CHA: '魅力',
      };

      function buildCharHTML(data, isMain = false, entityType = 'current', entityName = '') {
        if (!data) return "<div style='padding:20px; text-align:center; color:#666;'>暂无数据</div>";

        const hpCur = _.get(data, '血量.当前', 0);
        const hpMax = _.get(data, '血量.最大', 100);
        const expCur = _.get(data, '经验值.当前', 0);
        const expMax = _.get(data, '经验值.升级所需', 100);
        const wCur = _.get(data, '背包.负重.当前', 0);
        const wMax = _.get(data, '背包.负重.最大', 100);
        const bodySize = _.get(data, '体型', '1.75m');
        const status = _.get(data, '状态', '正常');
        const trauma = _.get(data, '创伤', {});
        const atkCount = _.get(data, '攻击次数', 1);
        const appearance = _.get(data, '外貌', '暂无外貌描述');
        const attrPt = _.get(data, '属性点', 0);
        const traitPt = _.get(data, '特质点', 0);
        const formatAttr = value => {
          if (value && typeof value === 'object') {
            const base = Number(value.基础 ?? 0) || 0;
            const bonus = Number(value.加成 ?? 0) || 0;
            return { base, bonus };
          }
          const base = Number(value ?? 0) || 0;
          return { base, bonus: 0 };
        };
        const stance = _.get(data, '立场', '中立');
        const faction = _.get(data, '派系', '无派系');
        const factionDisplay = `${stance} - ${faction}`;
        let factionColor = 'var(--accent-yellow)';
        if (stance === '敌方') factionColor = 'var(--accent-danger)';
        if (stance === '友方') factionColor = 'var(--accent-positive)';

        const canAddAttr = (entityType === 'current' || entityType === 'squad') && attrPt > 0;
        let attrHTML = Object.entries(_.get(data, '属性', {}))
          .map(([k, v]) => {
            const label = attrLabels[k] || k;
            const tip = attrTooltips[k] || `${label}: 核心属性`;
            const { base, bonus } = formatAttr(v);
            const bonusText = bonus !== 0 ? `(${bonus > 0 ? '+' : ''}${bonus})` : '';
            const clickableClass = canAddAttr ? 'stat-clickable' : '';
            return `<div class="stat-item ${clickableClass} has-tooltip" data-attr="${k}" data-entity="${entityType}" data-name="${entityName}" data-tooltip="${tip}"><b>${label}</b>${base}${bonusText}</div>`;
          })
          .join('');

        let itemHTML = Object.entries(_.get(data, '背包.物品', {}))
          .map(([name, d]) => {
            const desc = _.get(d, '介绍', '无描述');
            const w = _.get(d, '重量', 0);
            const val = _.get(d, '价值', 0);
            const tip = `${name}\n重量: ${w}kg\n价值: ${val} c.cat\n\n${desc}`;
            return `<div class="item-tag has-tooltip" data-tooltip="${tip}">${name} x${_.get(d, '数量', 1)}</div>`;
          })
          .join('');

        /* 修改点：整合特质、临时特质、正面效果和负面效果，并用不同颜色显示 */
        const traits = _.get(data, '特质', {});
        const temporaryTraits = _.get(data, '临时特质', {});
        const positiveEffects = _.get(data, '正面效果', {});
        const negativeEffects = _.get(data, '负面效果', {});
        let allTraitsHTML = [];
        /* 添加正面效果 (绿色) */
        Object.entries(positiveEffects).forEach(([name, desc]) => {
          allTraitsHTML.push(
            `<span class="item-tag has-tooltip" style="border-color:var(--accent-positive); color:var(--accent-positive); background-color: rgba(46, 204, 113, 0.1);" data-tooltip="${name}\n\n${desc}">${name}</span>`,
          );
        });
        /* 添加负面效果 (红色) */
        Object.entries(negativeEffects).forEach(([name, desc]) => {
          allTraitsHTML.push(
            `<span class="item-tag has-tooltip" style="border-color:var(--accent-danger); color:var(--accent-danger); background-color: rgba(231, 76, 60, 0.1);" data-tooltip="${name}\n\n${desc}">${name}</span>`,
          );
        });
        /* 添加临时特质 (黄色) */
        Object.entries(temporaryTraits).forEach(([name, data]) => {
          const tempDesc = _.get(data, '描述', '');
          const tempRemove = _.get(data, '消除', '');
          const tempTooltip = `${name}\n\n${tempDesc}${tempRemove ? `\n\n消除: ${tempRemove}` : ''}`;
          allTraitsHTML.push(
            `<span class="item-tag has-tooltip" style="border-color:var(--accent-yellow); color:var(--accent-yellow); background-color: rgba(241, 196, 15, 0.12);" data-tooltip="${tempTooltip}">${name}</span>`,
          );
        });
        /* 添加普通特质 (默认色) */
        Object.entries(traits).forEach(([name, desc]) => {
          allTraitsHTML.push(`<span class="item-tag has-tooltip" data-tooltip="${name}\n\n${desc}">${name}</span>`);
        });
        let traitHTML = allTraitsHTML.join('');

        const traumaEntries = Object.entries(trauma)
          .filter(([, value]) => value && typeof value === 'object' && _.get(value, '描述'))
          .map(([part, value]) => {
            const desc = _.get(value, '描述', '');
            return `<span class="item-tag">${part}: ${desc}</span>`;
          });
        let traumaDetailHTML = traumaEntries.length ? traumaEntries.join('') : `<span style="color:#666">无伤</span>`;

        const mainWep = _.get(data, '主武器', {});
        const subWep = _.get(data, '副武器', {});
        const arm = _.get(data, '护甲', {});
        const mainName = _.get(mainWep, '名字') || _.get(mainWep, '介绍') || '空手';
        const hasSubWeapon = !!(_.get(subWep, '名字') && _.get(subWep, '名字') !== '无');
        const formatEffects = obj => {
          if (!obj || Object.keys(obj).length === 0) return '无';
          return Object.entries(obj)
            .map(([key, value]) => {
              if (Array.isArray(value)) {
                const list = value
                  .map(item => (typeof item === 'object' ? JSON.stringify(item) : String(item)))
                  .join(', ');
                return `${key}: ${list}`;
              }
              if (typeof value === 'object') return `${key}: ${JSON.stringify(value)}`;
              return `${key}: ${value}`;
            })
            .join('；');
        };
        const subWeaponBlock = hasSubWeapon
          ? `\n\n[副手] ${_.get(subWep, '品质', '普通')} ${_.get(subWep, '种类', '无')}\n伤害: ${_.get(subWep, '伤害骰', '0')}\n伤害类型: ${_.get(subWep, '伤害类型', '无')}\n特效: ${formatEffects(_.get(subWep, '特效', {}))}\n价值: ${_.get(subWep, '价值', 0)} c.cat\n介绍: ${_.get(subWep, '介绍', '无')}`
          : '';
        /* 修改点：在武器tooltip中增加价值、伤害类型、特效，副手为空则隐藏 */
        const wepTooltip = `[主手] ${_.get(mainWep, '品质', '普通')} ${_.get(mainWep, '种类', '无')}\n伤害: ${_.get(mainWep, '伤害骰', '1d4')}\n伤害类型: ${_.get(mainWep, '伤害类型', '无')}\n特效: ${formatEffects(_.get(mainWep, '特效', {}))}\n价值: ${_.get(mainWep, '价值', 0)} c.cat\n介绍: ${_.get(mainWep, '介绍', '无')}${subWeaponBlock}`;
        const armorDR = _.get(arm, '防护能力(DR)', '0');

        let statusClass = '';
        if (status === '战斗中' || status === '休克') statusClass = 'danger';
        else if (status === '警戒' || status === '逃跑中') statusClass = 'warn';

        return `
                <div style="display:flex; justify-content:space-between; align-items:end; margin-bottom:15px; border-bottom:1px solid #444; padding-bottom:15px;">
                    <div style="width:100%"><div style="font-family:var(--font-header); font-size:2.2em; color:var(--accent-gold);">${_.get(data, '名字') || _.get(data, 'id', '未知')}</div><div style="color:var(--text-dim); margin-top:5px;">${_.get(data, '种族.名称', '人类')} | Lv.${_.get(data, '等级', 1)} | ${bodySize}<span class="has-tooltip" data-tooltip="立场 - 派系" style="margin-left:10px; background:${factionColor}; padding:2px 8px; font-size:0.8em; color:#fff; border-radius:2px;">${factionDisplay}</span></div></div></div>
                <div class="desc-text">"${appearance}"</div>
                <div class="detail-grid">
                    <div>
                        <div class="section-box">
                            <div class="section-title">状态监测</div>
                            <div class="status-row">
                                <div class="status-header"><span>生命值 (HP)<span class="status-badge ${statusClass}">${status}</span></span><span>${hpCur} / ${hpMax}</span></div>
                                <div class="bar-container"><div class="bar-fill bar-hp" style="width:${Math.min((hpCur / hpMax) * 100, 100)}%"></div></div>
                            </div>
                            <div class="status-row">
                                <div class="status-header"><span>经验值 (EXP)</span><span>${expCur} / ${expMax}</span></div>
                                <div class="bar-container"><div class="bar-fill bar-exp" style="width:${Math.min((expCur / expMax) * 100, 100)}%"></div></div>
                            </div>
                        </div>
                        <div class="section-box">
                            <div class="section-title">身体属性</div>
                            <div class="points-summary"><span class="point-tag">属性点: ${attrPt}</span><span class="point-tag">特质点: ${traitPt}</span><span class="point-tag" style="border-color:var(--accent-danger); color:var(--accent-danger)">攻击次数: ${atkCount}</span></div>
                            <div class="stat-grid">${attrHTML}</div>
                        </div>
                    </div>
                    <div>
                        <div class="section-box">
                            <div class="section-title">装备与特质</div>
                            <div style="margin-bottom:10px;" class="has-tooltip" data-tooltip="${wepTooltip}"><span style="color:#888">武器:</span> <span style="color:var(--text-main); border-bottom:1px dashed #666;">${mainName}</span>${hasSubWeapon ? `<span style="color:#666; margin-left:8px;">/ ${_.get(subWep, '名字')}</span>` : ''}</div>
                            <div style="margin-bottom:15px;" class="has-tooltip" data-tooltip="防护等级(DR): ${armorDR}\n\n${_.get(arm, '介绍', '无')}"><span style="color:#888">护甲:</span> <span style="color:var(--text-main); border-bottom:1px dashed #666;">${_.get(arm, '种类', '无')}</span></div>
                            <div class="tag-box">${traitHTML || '<span style="color:#666">无特质</span>'}</div>
                        </div>
                        <div class="section-box">
                            <div class="section-title">背包物品 (负重: ${wCur}/${wMax} kg)</div>
                            <div class="tag-box">${itemHTML || '<span style="color:#666">背包为空</span>'}</div>
                        </div>
                        <div class="section-box">
                            <div class="section-title">创伤状态</div>
                            <div class="tag-box">${traumaDetailHTML}</div>
                        </div>
                    </div>
                </div>`;
      }

      function renderFactionList(container, factions, isHostile) {
        container.empty();
        if (!factions || Object.keys(factions).length === 0) {
          container.html('<span style="color:#666">无记录</span>');
          return;
        }
        const color = isHostile ? 'var(--accent-danger)' : 'var(--accent-positive)';
        const html = Object.entries(factions)
          .map(([name, desc]) => {
            return `<span class="faction-pill has-tooltip" data-tooltip="${desc}" style="border-color:${color}; color:${color}">${name}</span>`;
          })
          .join('');
        container.html(html);
      }

      async function init() {
        await waitGlobalInitialized('Mvu');
        const update = () => {
          const raw = getAllVariables();
          const data = _.get(raw, 'stat_data', {});
          const world = _.get(data, '世界', {});
          const worldDay = _.get(world, '天数', 1);
          $('#top-day').text(`第 ${worldDay} 天`);
          const locationStr = `${_.get(world, '区域', '未知区域')} - ${_.get(world, '城镇', '荒野')} - ${_.get(world, '时间', '--:--')}`;
          $('#top-loc').text(locationStr);
          $('#top-money').text(_.get(world, '金钱', 0) + ' c.cat');
          $('#my-faction').text(_.get(data, '我方派系名称', '无派系'));
          const eventText = _.get(world, '当前事件', '');
          $('#world-event').text(eventText && eventText !== '' ? eventText : '当前无特殊事件');
          $('#world-player').html(
            buildCharHTML(_.get(data, '当前角色'), true, 'current', _.get(data, '当前角色.id', '')),
          );

          const squadList = $('#squad-list').empty();
          const squadData = _.get(data, '小队成员', {});
          if (Object.keys(squadData).length === 0) {
            squadList.html('<div style="text-align:center; padding:40px; color:#666;">当前没有小队成员</div>');
          } else {
            Object.entries(squadData).forEach(([k, v]) => {
              const card = $(
                `<div class="char-card"><div><span style="font-weight:bold">${k}</span></div><div>HP: ${_.get(v, '血量.当前')}</div></div>`,
              );
              card.on('click', () => {
                $('#modal-content-inner').html(buildCharHTML(v, false, 'squad', k));
                openModal();
              });
              squadList.append(card);
            });
          }

          const viewList = $('#view-list').empty();
          const viewData = _.get(data, '视野', {});
          if (Object.keys(viewData).length === 0)
            viewList.html('<div style="text-align:center; padding:30px; color:#555;">视野内无其他成员</div>');
          else {
            Object.entries(viewData).forEach(([k, v]) => {
              const stance = _.get(v, '立场', '中立');
              const faction = _.get(v, '派系', '无派系');
              const displayString = `[${stance} - ${faction}]`;

              let color = 'var(--accent-yellow)';
              if (stance === '敌方') color = 'var(--accent-danger)';
              if (stance === '友方') color = 'var(--accent-positive)';

              const card = $(
                `<div class="char-card" style="border-left:3px solid ${color}"><div><span style="font-size:0.8em; color:${color}; margin-right:8px;">${displayString}</span><span>${k}</span></div><div style="font-size:0.9em; color:#888;">${_.get(v, '种族.名称', '')}</div></div>`,
              );
              card.on('click', () => {
                $('#modal-content-inner').html(buildCharHTML(v, false, 'view', k));
                openModal();
              });
              viewList.append(card);
            });
          }

          $('#intel-rumors').text(_.get(data, '闲言.当前内容', '暂无传闻'));
          renderFactionList($('#intel-hostile'), _.get(data, '局势.敌对派系', {}), true);
          renderFactionList($('#intel-ally'), _.get(data, '局势.友方派系', {}), false);
          $('#intel-world-situation').text(_.get(data, '局势.世界局势', '') || '暂无世界局势');

          const mList = $('#mission-list').empty();
          const missions = _.get(data, '任务系统', {});
          if (Object.keys(missions).length === 0) {
            mList.html('<div style="text-align:center; padding:40px; color:#666;">当前无任务日志</div>');
          } else {
            Object.entries(missions).forEach(([mainMissionName, mainMissionData]) => {
              const missionStatus = _.get(mainMissionData, '主任务状态', '状态未知');
              let subtasksHTML = '';
              const subtasks = _.get(mainMissionData, '子任务', {});
              if (Object.keys(subtasks).length > 0) {
                subtasksHTML = '<ul class="subtask-list">';
                Object.entries(subtasks).forEach(([subtaskName, subtaskData]) => {
                  const current = _.get(subtaskData, '进度.当前', 0);
                  const target = _.get(subtaskData, '进度.目标', 1);
                  const status = _.get(subtaskData, '状态', '进行中');
                  const desc = _.get(subtaskData, '描述', '');
                  const progressPercent = target > 0 ? Math.min((current / target) * 100, 100) : 0;
                  const statusClass = status === '已完成' ? 'completed' : '';
                  const descHtml = desc ? `<div class="subtask-desc">${desc}</div>` : '';
                  subtasksHTML += `<li class="subtask-item ${statusClass}"><div class="subtask-name">${subtaskName}</div>${descHtml}<div class="subtask-progress-container"><div class="subtask-progress-bar-container"><div class="subtask-progress-bar" style="width: ${progressPercent}%"></div></div><div class="subtask-progress-text">${current} / ${target}</div></div></li>`;
                });
                subtasksHTML += '</ul>';
              }
              const missionBody = `<div class="mission-description">${_.get(mainMissionData, '描述', '暂无描述。')}</div><div class="mission-reward">奖励: ${_.get(mainMissionData, '奖励', '无')}</div>${subtasksHTML}`;
              mList.append(
                `<div class="mission-item"><div class="mission-header" onclick="toggleMission(this)"><span>${mainMissionName}</span><span style="color:var(--accent-gold)">${missionStatus}</span></div><div class="mission-body">${missionBody}</div></div>`,
              );
            });
          }

          const pastList = $('#past-list').empty();
          if (!$('#past-date-input').val()) {
            $('#past-date-input').val(worldDay);
          }
          const pastData = _.get(data, '往事', []);
          if (!Array.isArray(pastData) || pastData.length === 0) {
            pastList.html('<div style="text-align:center; padding:30px; color:#666;">暂无往事记录</div>');
          } else {
            const pastHTML = pastData
              .map((item, index) => {
                const rawDate = _.get(item, '日期', '');
                const dateNumber = Number(rawDate);
                const dateLabel =
                  Number.isFinite(dateNumber) && rawDate !== '' ? `第 ${dateNumber} 天` : rawDate || '未标记天数';
                const descText = _.get(item, '描述', '');
                return `<div class="past-item"><div class="past-date">${dateLabel}</div><div class="past-desc">${descText}</div><button class="past-delete-btn" data-index="${index}">删除</button></div>`;
              })
              .join('');
            pastList.html(pastHTML);
          }
        };
        update();
        eventOn(Mvu.events.VARIABLE_UPDATE_ENDED, update);

        async function addPastEntry() {
          const dateValue = $('#past-date-input').val();
          const descValue = $('#past-desc-input').val();

          const option = { type: 'message', message_id: getCurrentMessageId() };
          const mvuData = Mvu.getMvuData(option);
          const worldDay = _.get(mvuData, 'stat_data.世界.天数', 1);
          const dateNumber = dateValue ? Number(dateValue) : worldDay;
          if (!descValue || Number.isNaN(dateNumber)) return;

          const list = _.get(mvuData, 'stat_data.往事', []);
          const nextList = Array.isArray(list) ? [...list] : [];
          nextList.push({ 日期: dateNumber, 描述: String(descValue) });
          _.set(mvuData, 'stat_data.往事', nextList);
          await Mvu.replaceMvuData(mvuData, option);
          $('#past-date-input').val('');
          $('#past-desc-input').val('');
          update();
        }

        let pendingPastDeleteIndex = null;

        function openPastDeleteConfirm(index) {
          pendingPastDeleteIndex = index;
          $('#confirm-modal').css('display', 'flex');
        }

        function closePastDeleteConfirm() {
          pendingPastDeleteIndex = null;
          $('#confirm-modal').hide();
        }

        async function deletePastEntry(index) {
          const option = { type: 'message', message_id: getCurrentMessageId() };
          const mvuData = Mvu.getMvuData(option);
          const list = _.get(mvuData, 'stat_data.往事', []);
          if (!Array.isArray(list)) return;
          const nextList = list.filter((_, i) => i !== index);
          _.set(mvuData, 'stat_data.往事', nextList);
          await Mvu.replaceMvuData(mvuData, option);
          update();
        }

        $('#past-add-btn').on('click', () => {
          addPastEntry();
        });
        $('#past-list').on('click', '.past-delete-btn', function () {
          const index = Number($(this).attr('data-index'));
          if (!Number.isNaN(index)) {
            openPastDeleteConfirm(index);
          }
        });

        $('#confirm-cancel').on('click', () => {
          closePastDeleteConfirm();
        });
        $('#confirm-ok').on('click', () => {
          if (pendingPastDeleteIndex !== null) {
            deletePastEntry(pendingPastDeleteIndex);
          }
          closePastDeleteConfirm();
        });
        $('#confirm-modal').on('click', function (e) {
          if (e.target === this) {
            closePastDeleteConfirm();
          }
        });

        $(document).on('click', '.stat-item.stat-clickable', async function () {
          const attrKey = $(this).attr('data-attr');
          const entityType = $(this).attr('data-entity');
          const entityName = $(this).attr('data-name');
          if (!attrKey || !entityType) return;

          const option = { type: 'message', message_id: getCurrentMessageId() };
          const mvuData = Mvu.getMvuData(option) || {};
          if (!_.get(mvuData, 'stat_data')) {
            const rawVars = getAllVariables();
            const fallbackData = _.get(rawVars, 'stat_data', {});
            if (!_.isEmpty(fallbackData)) {
              _.set(mvuData, 'stat_data', fallbackData);
            }
          }

          let basePath = '';
          if (entityType === 'current') {
            basePath = 'stat_data.当前角色';
          } else if (entityType === 'squad' && entityName) {
            basePath = `stat_data.小队成员.${entityName}`;
          } else {
            return;
          }

          const attrPointPath = `${basePath}.属性点`;
          const attrPath = `${basePath}.属性.${attrKey}`;
          const attrPoint = Number(_.get(mvuData, attrPointPath, 0));
          if (attrPoint <= 0) return;

          const currentValue = _.get(mvuData, attrPath, 0);
          let nextValue = currentValue;
          if (typeof currentValue === 'object' && currentValue !== null) {
            const base = Number(_.get(currentValue, '基础', 0));
            const bonus = Number(_.get(currentValue, '加成', 0));
            nextValue = { ...currentValue, 基础: base + 1, 加成: bonus };
          } else {
            nextValue = Number(currentValue) + 1;
          }

          _.set(mvuData, attrPath, nextValue);
          _.set(mvuData, attrPointPath, attrPoint - 1);
          await Mvu.replaceMvuData(mvuData, option);
          update();
        });

        $('#char-modal').on('click', function (e) {
          if (e.target === this) {
            closeModal();
          }
        });
        $(document).on('keydown', function (e) {
          if (e.key === 'Escape') {
            closeModal();
          }
        });

        const tip = $('#tooltip');
        let tipPinned = false;
        let tipOwner = null;

        function showTip(text, x, y) {
          if (!text) return;
          tip.text(text).show();
          let t = y + 15;
          let l = x + 15;
          if (l + tip.outerWidth() > window.innerWidth) l = x - tip.outerWidth() - 10;
          if (t + tip.outerHeight() > window.innerHeight) t = y - tip.outerHeight() - 10;
          tip.css({ top: t, left: l });
        }

        function hideTip() {
          tip.hide();
        }

        $(document)
          .on('mouseenter', '.has-tooltip', function (e) {
            if (tipPinned) return;
            const text = $(this).attr('data-tooltip');
            showTip(text, e.clientX, e.clientY);
          })
          .on('mouseleave', '.has-tooltip', function () {
            if (tipPinned) return;
            hideTip();
          })
          .on('mousemove', function (e) {
            if (tip.css('display') !== 'none' && !tipPinned) {
              showTip(tip.text(), e.clientX, e.clientY);
            }
          })
          .on('click', '.has-tooltip', function (e) {
            const text = $(this).attr('data-tooltip');
            if (!text) return;

            if (tipPinned && tipOwner === this) {
              tipPinned = false;
              tipOwner = null;
              hideTip();
              return;
            }

            tipPinned = true;
            tipOwner = this;
            showTip(text, e.clientX, e.clientY);
          })
          .on('click', function (e) {
            if ($(e.target).closest('.has-tooltip').length === 0) {
              tipPinned = false;
              tipOwner = null;
              hideTip();
            }
          });
      }
      $(errorCatched(init));
    </script>
  </head>
  <body>
    <div class="main-container collapsed">
      <div class="top-bar">
        <div class="top-left">
          <span class="day-badge" id="top-day">第 1 天</span>
          <span class="location-info" id="top-loc">边境地带 - 枢纽城 - 下午</span>
        </div>
        <div class="top-right">
          <span id="my-faction" style="margin-right: 15px; font-weight: normal; color: var(--text-dim)"></span>
          <span id="top-money">0 c.cat</span>
          <button class="toggle-btn" onclick="toggleCollapse()">▼</button>
        </div>
      </div>
      <div class="collapsible-content">
        <div class="nav-tabs">
          <div class="tab-btn active" onclick="switchTab('world')" data-tab="world">概览</div>
          <div class="tab-btn" onclick="switchTab('squad')" data-tab="squad">小队</div>
          <div class="tab-btn" onclick="switchTab('view')" data-tab="view">视野</div>
          <div class="tab-btn" onclick="switchTab('intel')" data-tab="intel">情报</div>
          <div class="tab-btn" onclick="switchTab('mission')" data-tab="mission">日志</div>
          <div class="tab-btn" onclick="switchTab('past')" data-tab="past">往事</div>
          <div class="tab-btn" onclick="switchTab('map')" data-tab="map">地图</div>
        </div>
        <div class="content-area">
          <div id="pane-world" class="tab-pane active">
            <div class="section-box">
              <div class="section-title">当前事件</div>
              <div id="world-event" class="event-text"></div>
            </div>
            <div id="world-player"></div>
          </div>
          <div id="pane-squad" class="tab-pane">
            <div class="section-title">小队成员</div>
            <div id="squad-list"></div>
          </div>
          <div id="pane-view" class="tab-pane">
            <div class="section-title">周边环境</div>
            <div id="view-list"></div>
          </div>
          <div id="pane-intel" class="tab-pane">
            <div class="section-box">
              <div class="section-title">世界局势</div>
              <div style="margin-bottom: 10px">
                <span style="color: #888; margin-right: 10px">敌对:</span><span id="intel-hostile"></span>
              </div>
              <div style="margin-bottom: 10px">
                <span style="color: #888; margin-right: 10px">友方:</span><span id="intel-ally"></span>
              </div>
              <div>
                <span style="color: #888; margin-right: 10px">局势:</span><span id="intel-world-situation"></span>
              </div>
            </div>
            <div class="section-box">
              <div class="section-title">街谈巷议</div>
              <div id="intel-rumors" style="font-style: italic; color: #ccc"></div>
            </div>
          </div>
          <div id="pane-mission" class="tab-pane"><div id="mission-list"></div></div>
          <div id="pane-past" class="tab-pane">
            <div class="section-title">往事</div>
            <div class="past-controls">
              <input id="past-date-input" class="past-input" type="number" placeholder="天数(默认当前天数)" />
              <textarea id="past-desc-input" class="past-textarea" placeholder="描述"></textarea>
              <button id="past-add-btn" class="past-add-btn">添加</button>
            </div>
            <div id="past-list"></div>
          </div>
          <div id="pane-map" class="tab-pane">
            <div class="section-title">地图</div>
            <div class="map-frame-wrap">
              <div id="map-root"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="char-modal" class="modal-overlay">
      <div class="modal-content">
        <button class="close-btn" onclick="closeModal()">×</button>
        <div id="modal-content-inner"></div>
      </div>
    </div>
    <div id="confirm-modal" class="modal-overlay">
      <div class="confirm-modal">
        <div class="confirm-title">确认删除</div>
        <div>是否删除该往事记录？</div>
        <div class="confirm-actions">
          <button id="confirm-cancel" class="confirm-btn">取消</button>
          <button id="confirm-ok" class="confirm-btn danger">删除</button>
        </div>
      </div>
    </div>
    <div id="tooltip"></div>
  </body>
</html>
